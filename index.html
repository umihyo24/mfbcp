<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monster Card Battle MVP</title>
  <style>
    :root {
      color-scheme: dark;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #101a38;
      font-family: Arial, sans-serif;
    }
    canvas {
      border: 2px solid #304c8e;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.45);
      background: #1f3564;
      width: min(96vw, 1200px);
      height: auto;
      aspect-ratio: 1200 / 720;
    }
  </style>
</head>
<body>
  <canvas id="game" width="1200" height="720"></canvas>

  <script>
    const CONFIG = {
      canvas: { width: 1200, height: 720 },
      teamSize: 3,
      handSize: 5,
      maxLogEntries: 80,
      maxVisibleLog: 8,
      maxVisibleDetailLines: 6,
      turnBannerHeight: 62,
      monsterArea: { x: 26, y: 82, width: 760, height: 402 },
      handArea: { x: 26, y: 500, width: 760, height: 192 },
      detailPanel: { x: 804, y: 82, width: 370, height: 205 },
      resourcePanel: { x: 804, y: 300, width: 370, height: 185 },
      logPanel: { x: 804, y: 500, width: 370, height: 192 },
      monsterCard: { width: 236, height: 190, gap: 16, iconSize: 88, hpBarWidth: 136, hpBarHeight: 14 },
      handCard: { width: 142, height: 178, gap: 12 },
      hp: { base: 100 },
      guts: { max: 5, startPlayer: 3, startEnemy: 3, gainPerEnemyAttack: 1, gainPerShard: 1 },
      energy: { max: 10, shardGain: 1 },
      enemy: { minDamage: 15, maxDamage: 25 },
      cardCosts: { COMMON: 2, TYPE: 3, SHARD: 0 },
      colors: {
        bg: '#1f3564',
        panel: '#243f72',
        panelDark: '#1a2d52',
        text: '#f2f3ff',
        muted: '#9db0d8',
        hp: '#62e57a',
        hpBack: '#243948',
        fire: '#f05a43',
        thunder: '#f9c744',
        earth: '#6ccf70',
        dead: 'rgba(26, 34, 54, 0.82)',
        selected: '#ffe867',
        playableGlow: 'rgba(255, 230, 103, 0.65)',
      },
    };

    const ASSETS = {
      monsters: {
        ember: '/assets/monsters/ember.png',
        spark: '/assets/monsters/spark.png',
        moss: '/assets/monsters/moss.png',
        enemyEmber: '/assets/monsters/enemy_ember.png',
        enemySpark: '/assets/monsters/enemy_spark.png',
        enemyMoss: '/assets/monsters/enemy_moss.png',
      },
      cards: {
        flameHit: '/assets/cards/flame_hit.png',
        sparkHit: '/assets/cards/spark_hit.png',
        earthHit: '/assets/cards/earth_hit.png',
        fireShard: '/assets/cards/fire_shard.png',
        thunderShard: '/assets/cards/thunder_shard.png',
        earthShard: '/assets/cards/earth_shard.png',
      },
      icons: {
        fire: '/assets/icons/fire.png',
        thunder: '/assets/icons/thunder.png',
        earth: '/assets/icons/earth.png',
      },
    };

    const ctx = document.getElementById('game').getContext('2d');

    const gameState = {
      phase: 'start',
      currentTurn: 'player',
      winner: null,
      needsEnemyTurn: false,
      enemyTurnAt: 0,
      selectedCardId: null,
      selectedEnemyId: null,
      hoveredCardId: null,
      detailScroll: 0,
      logScroll: 0,
      imageStore: {},
      player: {
        guts: CONFIG.guts.startPlayer,
        maxGuts: CONFIG.guts.max,
        energy: { fire: 0, thunder: 0, earth: 0 },
        maxEnergy: CONFIG.energy.max,
        deckCount: 12,
        discardCount: 0,
        monsters: [],
      },
      enemy: {
        guts: CONFIG.guts.startEnemy,
        maxGuts: CONFIG.guts.max,
        energy: { fire: 0, thunder: 0, earth: 0 },
        maxEnergy: CONFIG.energy.max,
        deckCount: 12,
        discardCount: 0,
        monsters: [],
      },
      hand: [],
      discardPile: [],
      log: [],
      cardRects: [],
      enemyRects: [],
    };

    function makeMonster(id, name, element, spriteKey) {
      return { id, name, element, spriteKey, hp: CONFIG.hp.base, maxHp: CONFIG.hp.base, alive: true };
    }

    function makeCard(id, name, type, element, cost, req, description, spriteKey, effect) {
      return { id, name, type, element, cost, energyReq: req, description, spriteKey, effect };
    }

    function initializeGame() {
      gameState.player.monsters = [
        makeMonster('p1', 'Ember Cub', 'fire', 'ember'),
        makeMonster('p2', 'Bolt Pup', 'thunder', 'spark'),
        makeMonster('p3', 'Root Pal', 'earth', 'moss'),
      ];
      gameState.enemy.monsters = [
        makeMonster('e1', 'Raider Ember', 'fire', 'enemyEmber'),
        makeMonster('e2', 'Raider Bolt', 'thunder', 'enemySpark'),
        makeMonster('e3', 'Raider Root', 'earth', 'enemyMoss'),
      ];
      gameState.hand = [
        makeCard('c1', 'Fire Jab', 'COMMON', 'fire', CONFIG.cardCosts.COMMON, { fire: 1, thunder: 0, earth: 0 }, 'Deal 20 damage to selected enemy.', 'flameHit', { kind: 'damage', amount: 20 }),
        makeCard('c2', 'Thunder Strike', 'TYPE', 'thunder', CONFIG.cardCosts.TYPE, { fire: 0, thunder: 1, earth: 0 }, 'Deal 28 damage to selected enemy.', 'sparkHit', { kind: 'damage', amount: 28 }),
        makeCard('c3', 'Earth Crush', 'TYPE', 'earth', CONFIG.cardCosts.TYPE, { fire: 0, thunder: 0, earth: 1 }, 'Deal 26 damage to selected enemy.', 'earthHit', { kind: 'damage', amount: 26 }),
        makeCard('c4', 'Fire Shard', 'SHARD', 'fire', CONFIG.cardCosts.SHARD, { fire: 0, thunder: 0, earth: 0 }, 'Gain +1 Guts and +1 Fire Energy.', 'fireShard', { kind: 'shard', energy: 'fire' }),
        makeCard('c5', 'Thunder Shard', 'SHARD', 'thunder', CONFIG.cardCosts.SHARD, { fire: 0, thunder: 0, earth: 0 }, 'Gain +1 Guts and +1 Thunder Energy.', 'thunderShard', { kind: 'shard', energy: 'thunder' }),
      ];
      gameState.phase = 'playing';
      appendLog('Battle started.');
    }

    function appendLog(message) {
      gameState.log.push(message);
      if (gameState.log.length > CONFIG.maxLogEntries) {
        gameState.log.shift();
      }
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function getRandomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function getElementColor(element) {
      return CONFIG.colors[element] || '#ffffff';
    }

    function getLivingMonsters(side) {
      return side.monsters.filter((m) => m.alive);
    }

    function getMonsterById(side, id) {
      return side.monsters.find((m) => m.id === id) || null;
    }

    function getCardById(id) {
      return gameState.hand.find((c) => c.id === id) || null;
    }

    function canPlayCard(card) {
      if (!card) return false;
      if (card.type === 'SHARD') return true;
      if (gameState.player.guts < card.cost) return false;
      return Object.entries(card.energyReq).every(([element, need]) => gameState.player.energy[element] >= need);
    }

    function hasValidTarget() {
      const target = getMonsterById(gameState.enemy, gameState.selectedEnemyId);
      return Boolean(target && target.alive);
    }

    function spendCardCost(card) {
      gameState.player.guts = clamp(gameState.player.guts - card.cost, 0, gameState.player.maxGuts);
    }

    function applyCardEffect(card) {
      if (card.effect.kind === 'damage') {
        const target = getMonsterById(gameState.enemy, gameState.selectedEnemyId);
        if (!target || !target.alive) {
          appendLog('Select a living enemy target first.');
          return false;
        }
        dealDamage(target, card.effect.amount, 'enemy');
        appendLog(`Dealt ${card.effect.amount} damage.`);
      }

      if (card.effect.kind === 'shard') {
        const e = card.effect.energy;
        gameState.player.guts = clamp(gameState.player.guts + CONFIG.guts.gainPerShard, 0, gameState.player.maxGuts);
        gameState.player.energy[e] = clamp(gameState.player.energy[e] + CONFIG.energy.shardGain, 0, gameState.player.maxEnergy);
        appendLog(`Gained +${CONFIG.guts.gainPerShard} Guts.`);
        appendLog(`Gained +${CONFIG.energy.shardGain} ${capitalize(e)} Energy.`);
      }
      return true;
    }

    function capitalize(text) {
      return text.charAt(0).toUpperCase() + text.slice(1);
    }

    function removeCardFromHand(cardId) {
      const idx = gameState.hand.findIndex((c) => c.id === cardId);
      if (idx < 0) return;
      const [card] = gameState.hand.splice(idx, 1);
      gameState.discardPile.push(card);
      gameState.player.discardCount += 1;
      gameState.player.deckCount = clamp(gameState.player.deckCount - 1, 0, 999);
      if (gameState.hand.length === 0) {
        appendLog('No cards left in hand.');
      }
    }

    function dealDamage(monster, amount, side) {
      monster.hp = clamp(monster.hp - amount, 0, monster.maxHp);
      if (monster.hp <= 0) {
        monster.alive = false;
        appendLog(`${monster.name} was defeated.`);
      }
      if (side === 'player') {
        gameState.selectedEnemyId = null;
      }
    }

    function queueEnemyTurn() {
      gameState.currentTurn = 'enemy';
      gameState.needsEnemyTurn = true;
      gameState.enemyTurnAt = performance.now() + 450;
    }

    function finalizePlayerAction(card) {
      removeCardFromHand(card.id);
      checkGameOver();
      if (gameState.phase !== 'gameover') {
        queueEnemyTurn();
      }
    }

    function playCard(cardId) {
      if (gameState.phase !== 'playing' || gameState.currentTurn !== 'player') return;
      const card = getCardById(cardId);
      if (!card) return;
      if (!canPlayCard(card)) {
        appendLog(`${card.name} is not playable.`);
        return;
      }
      if (card.effect.kind === 'damage' && !hasValidTarget()) {
        appendLog('Choose an enemy monster target.');
        return;
      }
      spendCardCost(card);
      appendLog(`Used ${card.name}.`);
      const applied = applyCardEffect(card);
      if (!applied) return;
      finalizePlayerAction(card);
    }

    function enemyTurn() {
      const attackers = getLivingMonsters(gameState.enemy);
      const targets = getLivingMonsters(gameState.player);
      if (attackers.length === 0 || targets.length === 0) return;
      const target = targets[getRandomInt(0, targets.length - 1)];
      const damage = getRandomInt(CONFIG.enemy.minDamage, CONFIG.enemy.maxDamage);
      dealDamage(target, damage, 'player');
      appendLog(`Enemy dealt ${damage} to ${target.name}.`);
      gameState.enemy.guts = clamp(gameState.enemy.guts + CONFIG.guts.gainPerEnemyAttack, 0, gameState.enemy.maxGuts);
      appendLog(`Enemy gained +${CONFIG.guts.gainPerEnemyAttack} Guts.`);
    }

    function checkGameOver() {
      const playerAlive = getLivingMonsters(gameState.player).length;
      const enemyAlive = getLivingMonsters(gameState.enemy).length;
      if (enemyAlive === 0) {
        gameState.phase = 'gameover';
        gameState.winner = 'PLAYER';
      } else if (playerAlive === 0) {
        gameState.phase = 'gameover';
        gameState.winner = 'ENEMY';
      }
      if (gameState.phase === 'gameover') {
        gameState.currentTurn = 'none';
        gameState.needsEnemyTurn = false;
        appendLog(`${gameState.winner} wins the battle.`);
      }
    }

    function update(now) {
      if (gameState.phase !== 'playing') return;
      if (gameState.currentTurn === 'enemy' && gameState.needsEnemyTurn && now >= gameState.enemyTurnAt) {
        gameState.needsEnemyTurn = false;
        enemyTurn();
        checkGameOver();
        if (gameState.phase !== 'gameover') {
          gameState.currentTurn = 'player';
        }
      }
    }

    function loadAssets() {
      const paths = Object.values(ASSETS).flatMap((group) => Object.entries(group));
      paths.forEach(([key, src]) => {
        const img = new Image();
        gameState.imageStore[key] = { image: img, ok: false, src };
        img.onload = () => { gameState.imageStore[key].ok = true; };
        img.onerror = () => { gameState.imageStore[key].ok = false; };
        img.src = src;
      });
    }

    function drawPanel(x, y, w, h) {
      ctx.fillStyle = CONFIG.colors.panel;
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = '#3b5f9f';
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, w, h);
    }

    function drawTurnBanner() {
      drawPanel(26, 14, 760, CONFIG.turnBannerHeight);
      ctx.fillStyle = CONFIG.colors.text;
      ctx.font = 'bold 42px Arial';
      ctx.textAlign = 'center';
      const text = gameState.phase === 'gameover' ? `${gameState.winner} WON` : gameState.currentTurn === 'player' ? 'PLAYER TURN' : 'ENEMY TURN';
      ctx.fillText(text, 406, 58);
    }

    function drawAssetOrFallback(key, x, y, w, h) {
      const ref = gameState.imageStore[key];
      if (ref && ref.ok) {
        ctx.drawImage(ref.image, x, y, w, h);
        return;
      }
      ctx.fillStyle = '#324b7f';
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = '#6f8fd2';
      ctx.strokeRect(x, y, w, h);
      ctx.fillStyle = '#d6e0ff';
      ctx.font = '14px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(key, x + w / 2, y + h / 2);
    }

    function drawElementIcon(element, x, y, size) {
      ctx.fillStyle = getElementColor(element);
      ctx.beginPath();
      ctx.arc(x + size / 2, y + size / 2, size / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1b1b1b';
      ctx.font = 'bold 14px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(element.charAt(0).toUpperCase(), x + size / 2, y + size / 2 + 5);
    }

    function drawMonsterRow(side, isEnemy, startX, startY) {
      const cards = side.monsters;
      cards.forEach((monster, idx) => {
        const x = startX + idx * (CONFIG.monsterCard.width + CONFIG.monsterCard.gap);
        const y = startY;
        const selected = isEnemy && gameState.selectedEnemyId === monster.id;
        drawMonsterCard(monster, x, y, selected);
        if (isEnemy) gameState.enemyRects.push({ id: monster.id, x, y, w: CONFIG.monsterCard.width, h: CONFIG.monsterCard.height });
      });
    }

    function drawMonsterCard(monster, x, y, selected) {
      drawPanel(x, y, CONFIG.monsterCard.width, CONFIG.monsterCard.height);
      if (selected) {
        ctx.strokeStyle = CONFIG.colors.selected;
        ctx.lineWidth = 4;
        ctx.strokeRect(x + 2, y + 2, CONFIG.monsterCard.width - 4, CONFIG.monsterCard.height - 4);
      }

      drawAssetOrFallback(monster.spriteKey, x + 74, y + 14, CONFIG.monsterCard.iconSize, CONFIG.monsterCard.iconSize);
      drawElementIcon(monster.element, x + 16, y + 12, 28);

      ctx.fillStyle = CONFIG.colors.text;
      ctx.font = 'bold 18px Arial';
      ctx.textAlign = 'left';
      ctx.fillText(`${Math.round(monster.hp)}/${monster.maxHp}`, x + 16, y + 124);

      ctx.fillStyle = CONFIG.colors.hpBack;
      ctx.fillRect(x + 16, y + 132, CONFIG.monsterCard.hpBarWidth, CONFIG.monsterCard.hpBarHeight);
      ctx.fillStyle = CONFIG.colors.hp;
      const hpw = (monster.hp / monster.maxHp) * CONFIG.monsterCard.hpBarWidth;
      ctx.fillRect(x + 16, y + 132, hpw, CONFIG.monsterCard.hpBarHeight);

      ctx.fillStyle = CONFIG.colors.text;
      ctx.font = '15px Arial';
      ctx.fillText(monster.name, x + 16, y + 165);

      if (!monster.alive) {
        ctx.fillStyle = CONFIG.colors.dead;
        ctx.fillRect(x, y, CONFIG.monsterCard.width, CONFIG.monsterCard.height);
      }
    }

    function drawBattleArea() {
      drawPanel(CONFIG.monsterArea.x, CONFIG.monsterArea.y, CONFIG.monsterArea.width, CONFIG.monsterArea.height);
      gameState.enemyRects = [];
      drawMonsterRow(gameState.enemy, true, CONFIG.monsterArea.x + 14, CONFIG.monsterArea.y + 14);
      drawMonsterRow(gameState.player, false, CONFIG.monsterArea.x + 14, CONFIG.monsterArea.y + 206);
    }

    function drawCard(card, x, y, hover) {
      const playable = canPlayCard(card) && (card.effect.kind !== 'damage' || hasValidTarget());
      const scale = hover ? 1.05 : 1;
      const dw = CONFIG.handCard.width * scale;
      const dh = CONFIG.handCard.height * scale;
      const dx = x - (dw - CONFIG.handCard.width) / 2;
      const dy = y - (dh - CONFIG.handCard.height) / 2;
      drawPanel(dx, dy, dw, dh);
      if (hover) {
        ctx.strokeStyle = CONFIG.colors.playableGlow;
        ctx.lineWidth = 3;
        ctx.strokeRect(dx + 1, dy + 1, dw - 2, dh - 2);
      }

      drawElementIcon(card.element, dx + 8, dy + 8, 24);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 20px Arial';
      ctx.textAlign = 'right';
      ctx.fillText(`${card.cost}`, dx + dw - 10, dy + 28);

      drawAssetOrFallback(card.spriteKey, dx + 12, dy + 36, dw - 24, 95);

      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.font = 'bold 15px Arial';
      ctx.fillText(card.name, dx + dw / 2, dy + dh - 18);

      if (!playable) {
        ctx.fillStyle = 'rgba(40, 48, 66, 0.62)';
        ctx.fillRect(dx, dy, dw, dh);
      }

      gameState.cardRects.push({ id: card.id, x: dx, y: dy, w: dw, h: dh });
    }

    function drawHandArea() {
      drawPanel(CONFIG.handArea.x, CONFIG.handArea.y, CONFIG.handArea.width, CONFIG.handArea.height);
      gameState.cardRects = [];
      gameState.hand.forEach((card, index) => {
        const x = CONFIG.handArea.x + 16 + index * (CONFIG.handCard.width + CONFIG.handCard.gap);
        const y = CONFIG.handArea.y + 7;
        drawCard(card, x, y, gameState.hoveredCardId === card.id);
      });
    }

    function drawResourceBlock(title, data, x, y) {
      ctx.fillStyle = '#dfe8ff';
      ctx.font = 'bold 24px Arial';
      ctx.textAlign = 'left';
      ctx.fillText(`${title} Guts: ${data.guts}/${data.maxGuts}`, x, y);

      const items = ['fire', 'thunder', 'earth'];
      items.forEach((el, idx) => {
        drawElementIcon(el, x + idx * 112, y + 14, 22);
        ctx.fillStyle = '#fff';
        ctx.font = '20px Arial';
        ctx.fillText(`${data.energy[el]}/${data.maxEnergy}`, x + 30 + idx * 112, y + 32);
      });

      ctx.fillStyle = '#fff';
      ctx.font = '22px Arial';
      ctx.fillText(`Deck ${data.deckCount}`, x, y + 70);
      ctx.fillText(`Discard ${data.discardCount}`, x + 140, y + 70);
    }

    function drawResourcePanel() {
      drawPanel(CONFIG.resourcePanel.x, CONFIG.resourcePanel.y, CONFIG.resourcePanel.width, CONFIG.resourcePanel.height);
      drawResourceBlock('Enemy', gameState.enemy, CONFIG.resourcePanel.x + 16, CONFIG.resourcePanel.y + 36);
      drawResourceBlock('Player', gameState.player, CONFIG.resourcePanel.x + 16, CONFIG.resourcePanel.y + 124);
    }

    function wrapText(text, maxWidth) {
      const words = text.split(' ');
      const lines = [];
      let current = '';
      words.forEach((word) => {
        const candidate = current ? `${current} ${word}` : word;
        if (ctx.measureText(candidate).width > maxWidth && current) {
          lines.push(current);
          current = word;
        } else {
          current = candidate;
        }
      });
      if (current) lines.push(current);
      return lines;
    }

    function drawDetailPanel() {
      drawPanel(CONFIG.detailPanel.x, CONFIG.detailPanel.y, CONFIG.detailPanel.width, CONFIG.detailPanel.height);
      const card = getCardById(gameState.selectedCardId);
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'left';
      if (!card) {
        ctx.font = '24px Arial';
        ctx.fillText('Card Detail', CONFIG.detailPanel.x + 16, CONFIG.detailPanel.y + 36);
        ctx.font = '18px Arial';
        ctx.fillStyle = CONFIG.colors.muted;
        ctx.fillText('Select a card from your hand.', CONFIG.detailPanel.x + 16, CONFIG.detailPanel.y + 70);
        return;
      }
      ctx.font = 'bold 26px Arial';
      ctx.fillText(card.name, CONFIG.detailPanel.x + 16, CONFIG.detailPanel.y + 36);
      ctx.font = '20px Arial';
      ctx.fillText(`Cost: ${card.cost}`, CONFIG.detailPanel.x + 16, CONFIG.detailPanel.y + 66);
      ctx.fillText(`Req: F${card.energyReq.fire} T${card.energyReq.thunder} E${card.energyReq.earth}`, CONFIG.detailPanel.x + 16, CONFIG.detailPanel.y + 92);
      const wrapped = wrapText(card.description, CONFIG.detailPanel.width - 32);
      const start = clamp(gameState.detailScroll, 0, Math.max(0, wrapped.length - CONFIG.maxVisibleDetailLines));
      ctx.font = '18px Arial';
      wrapped.slice(start, start + CONFIG.maxVisibleDetailLines).forEach((line, i) => {
        ctx.fillText(line, CONFIG.detailPanel.x + 16, CONFIG.detailPanel.y + 122 + i * 24);
      });
    }

    function drawLogPanel() {
      drawPanel(CONFIG.logPanel.x, CONFIG.logPanel.y, CONFIG.logPanel.width, CONFIG.logPanel.height);
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'left';
      ctx.font = 'bold 38px Arial';
      ctx.fillText('Log', CONFIG.logPanel.x + 16, CONFIG.logPanel.y + 42);
      const maxStart = Math.max(0, gameState.log.length - CONFIG.maxVisibleLog);
      const start = clamp(maxStart - gameState.logScroll, 0, maxStart);
      ctx.font = '19px Arial';
      gameState.log.slice(start, start + CONFIG.maxVisibleLog).forEach((entry, idx) => {
        ctx.fillStyle = '#d7e4ff';
        ctx.fillText(`• ${entry}`, CONFIG.logPanel.x + 16, CONFIG.logPanel.y + 78 + idx * 22);
      });
    }

    function render() {
      ctx.fillStyle = CONFIG.colors.bg;
      ctx.fillRect(0, 0, CONFIG.canvas.width, CONFIG.canvas.height);
      drawTurnBanner();
      drawBattleArea();
      drawDetailPanel();
      drawResourcePanel();
      drawHandArea();
      drawLogPanel();
    }

    function getHitRect(rects, x, y) {
      return rects.find((r) => x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) || null;
    }

    function onCanvasClick(event) {
      if (gameState.phase !== 'playing') return;
      const rect = event.target.getBoundingClientRect();
      const x = ((event.clientX - rect.left) / rect.width) * CONFIG.canvas.width;
      const y = ((event.clientY - rect.top) / rect.height) * CONFIG.canvas.height;

      const enemyHit = getHitRect(gameState.enemyRects, x, y);
      if (enemyHit) {
        const target = getMonsterById(gameState.enemy, enemyHit.id);
        if (target && target.alive) {
          gameState.selectedEnemyId = target.id;
        }
      }

      const cardHit = getHitRect(gameState.cardRects, x, y);
      if (cardHit) {
        gameState.selectedCardId = cardHit.id;
        playCard(cardHit.id);
      }
    }

    function onMouseMove(event) {
      const rect = event.target.getBoundingClientRect();
      const x = ((event.clientX - rect.left) / rect.width) * CONFIG.canvas.width;
      const y = ((event.clientY - rect.top) / rect.height) * CONFIG.canvas.height;
      const hit = getHitRect(gameState.cardRects, x, y);
      gameState.hoveredCardId = hit ? hit.id : null;
    }

    function onWheel(event) {
      const rect = event.target.getBoundingClientRect();
      const x = ((event.clientX - rect.left) / rect.width) * CONFIG.canvas.width;
      const y = ((event.clientY - rect.top) / rect.height) * CONFIG.canvas.height;
      const inDetail = x >= CONFIG.detailPanel.x && x <= CONFIG.detailPanel.x + CONFIG.detailPanel.width && y >= CONFIG.detailPanel.y && y <= CONFIG.detailPanel.y + CONFIG.detailPanel.height;
      const inLog = x >= CONFIG.logPanel.x && x <= CONFIG.logPanel.x + CONFIG.logPanel.width && y >= CONFIG.logPanel.y && y <= CONFIG.logPanel.y + CONFIG.logPanel.height;
      if (inDetail) {
        gameState.detailScroll = Math.max(0, gameState.detailScroll + Math.sign(event.deltaY));
      }
      if (inLog) {
        gameState.logScroll = Math.max(0, gameState.logScroll + Math.sign(event.deltaY));
      }
      if (inDetail || inLog) {
        event.preventDefault();
      }
    }

    function loop(now) {
      update(now);
      render();
      requestAnimationFrame(loop);
    }

    function start() {
      loadAssets();
      initializeGame();
      const canvas = document.getElementById('game');
      canvas.addEventListener('click', onCanvasClick);
      canvas.addEventListener('mousemove', onMouseMove);
      canvas.addEventListener('wheel', onWheel, { passive: false });
      requestAnimationFrame(loop);
    }

    start();
  </script>
</body>
</html>
