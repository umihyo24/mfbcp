<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>カードバトル MVP</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(160deg, #0c1630, #15284f);
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", system-ui, sans-serif;
      color: #eef4ff;
    }
    canvas {
      width: min(96vw, 1240px);
      height: auto;
      aspect-ratio: 1240 / 780;
      border: 2px solid #4567a5;
      background: #13264b;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.45);
    }
  </style>
</head>
<body>
  <canvas id="game" width="1240" height="780"></canvas>
  <script>
    (() => {
      const CONFIG = {
        w: 1240,
        h: 780,
        teamSize: 3,
        handSize: 5,
        maxLogEntries: 140,
        maxVisibleLog: 16,
        maxVisibleDetailLines: 10,
        MAX_ACTIONS_PER_TURN: 3,
        hp: { base: 100 },
        guts: { start: 2, max: 12, convertGain: 1 },
        drawGutsRecover: { 3: 1, 2: 2, 1: 3, 0: 0 },
        energy: { start: 1, max: 10, shardGain: 1, convertGain: 1 },
        damage: { common: 22, type: 30 },
        enemyHeader: { x: 24, y: 20, width: 1152, height: 132, iconSize: 84 },
        enemyHeaderSections: { message: 250, icon: 120, info: 230, gap: 12 },
        monsterArea: { x: 24, y: 166, width: 760, height: 360 },
        middleBand: { x: 24, y: 532, width: 760, height: 44 },
        turnBanner: { x: 34, y: 537, width: 420, height: 34 },
        playerHandArea: { x: 24, y: 582, width: 760, height: 164 },
        contextPanel: { x: 800, y: 166, width: 376, height: 314 },
        fieldPanel: { x: 800, y: 492, width: 376, height: 254 },
        monsterCard: { width: 242, height: 172, gap: 8, iconSize: 114, hpBarWidth: 204, hpBarHeight: 14 },
        handCard: { width: 142, height: 146, gap: 10 },
        enemyMiniCard: { width: 62, height: 88, gap: 6 },
        button: { width: 132, height: 32, gap: 10 },
        logOverlay: { x: 130, y: 80, width: 940, height: 560 },
        colors: {
          bg: '#1f3564',
          panel: '#243f72',
          border: '#4569ad',
          text: '#f4f7ff',
          muted: '#9db0d8',
          hp: '#62e57a',
          hpBack: '#243948',
          fire: '#f05a43',
          thunder: '#f9c744',
          earth: '#6ccf70',
          dead: 'rgba(30, 34, 48, 0.68)',
          actorSoft: 'rgba(120, 188, 255, 0.28)',
          actorStrong: '#7cc8ff',
          targetSoft: 'rgba(255, 101, 101, 0.3)',
          targetStrong: '#ff6a6a',
          playableGlow: 'rgba(255, 231, 114, 0.7)',
          cardDisabled: 'rgba(30, 38, 59, 0.72)',
          button: '#315899',
          buttonOff: '#243f68',
          overlay: 'rgba(9, 16, 30, 0.73)',
        },
      };

      const TEXT = {
        turn: {
          playerAttack: 'PLAYER TURN / ATTACK PHASE',
          playerGuts: 'PLAYER TURN / GUTS PHASE',
          enemyAttack: 'ENEMY TURN / ATTACK PHASE',
          enemyGuts: 'ENEMY TURN / GUTS PHASE',
          gameoverPlayer: 'PLAYER WINS',
          gameoverEnemy: 'ENEMY WINS',
        },
        button: {
          endAttack: 'End Attack Phase',
          finishTurn: 'End Turn',
          log: 'Log',
          closeLog: 'Close Log',
        },
        panel: {
          enemyHeaderTitle: 'Enemy',
          playerHand: 'Player Hand',
          contextTitle: 'Context / Detail',
          battleInfoTitle: 'Battle Info',
          logTitle: 'Battle Log',
        },
        preview: {
          playerUsed: 'Player used {card}',
          enemyUsed: 'Enemy used {card}',
          usedBy: '{actor} used {card}',
        },
        msg: {
          battleStart: 'Battle started.',
          drawRecover: '{side} recovered +{gain} Guts in draw phase.',
          attackStart: '{side} attack phase started.',
          enemyConvert: 'Enemy converted {n} cards in guts phase (+{n} Guts).',
          playerConvert: 'Player converted {n} cards in guts phase (+{n} Guts).',
          convertEnergy: 'Field gained +{gain} {element} from conversion.',
          convertGutsOnly: '{card} was converted for +{gain} Guts.',
          selectCard: '{card} selected. Choose actor.',
          selectActor: 'Actor selected. Choose target.',
          cancelSelection: 'Selection canceled.',
          invalidCard: 'Card is not playable: {reason}',
          invalidTarget: 'Invalid target.',
          cardUsedDamage: '{side} used {card} with {actor} on {target} for {amount}.',
          cardUsedShard: '{side} used {card} ({actor} -> {target}) for +1 Guts / +1 {energy} Energy.',
          cardEnhanced: '{card} enhanced!',
          cardEnhancedBonus: '{card} enhanced: +{bonus} damage',
          cardConsume: '{card} consumed {detail}.',
          defeated: '{name} was defeated.',
          win: '{side} wins.',
        },
        reason: {
          noCard: 'No card selected.',
          shardAlways: 'SHARD is always playable.',
          needGuts: 'Not enough Guts ({have}/{need}).',
          needFireShared: 'Not enough shared Fire energy.',
          needThunderShared: 'Not enough shared Thunder energy.',
          needEarthShared: 'Not enough shared Earth energy.',
          needConsumeEnergy: 'Not enough shared field energy to pay consume cost.',
          needActor: 'Select a living actor monster.',
          actedActor: 'This monster has already acted this turn.',
          typeMismatch: 'This monster cannot use that TYPE card.',
          needTarget: 'Select a valid target monster.',
          waitAttackPhase: 'Card can be used only in attack phase.',
        },
        state: {
          none: 'none',
          enemyIdleMessage: '様子見中だぜ…',
        },
      };

      const ASSETS = {
        monsters: {
          beast_bear: '/assets/monsters/beast_bear.png',
          thunder_wolf: '/assets/monsters/thunder_wolf.png',
          earth_turtle: '/assets/monsters/earth_turtle.png',
          enemy_beast_bear: '/assets/monsters/beast_bear.png',
          enemy_thunder_wolf: '/assets/monsters/thunder_wolf.png',
          enemy_earth_turtle: '/assets/monsters/earth_turtle.png',
        },
        cards: {
          atk_fire_common_punch: '/assets/cards/atk_fire_common_punch.png',
          atk_thunder_common_punch: '/assets/cards/atk_thunder_common_punch.png',
          atk_earth_common_punch: '/assets/cards/atk_earth_common_punch.png',
          atk_fire_beast_magmaPunch: '/assets/cards/atk_fire_beast_magmaPunch.png',
          atk_thunder_beast_boltBurst: '/assets/cards/atk_thunder_beast_boltBurst.png',
          atk_earth_beast_rootBurst: '/assets/cards/atk_earth_beast_rootBurst.png',
          atk_neutral_common_raiKa: '/assets/cards/atk_neutral_common_raiKa.png',
          atk_fire_beast_megaFlame: '/assets/cards/atk_fire_beast_megaFlame.png',
          atk_thunder_beast_stormNova: '/assets/cards/atk_thunder_beast_stormNova.png',
          sup_fire_common_shard: '/assets/cards/sup_fire_common_shard.png',
          sup_thunder_common_shard: '/assets/cards/sup_thunder_common_shard.png',
          sup_earth_common_shard: '/assets/cards/sup_earth_common_shard.png',
          def_beast_guard: '/assets/cards/def_beast_guard.png',
        },
      };
      const imageCache = new Map();

      const ELEMENTS = ["fire", "thunder", "earth"];
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      const gameState = {
        phase: 'start',
        turnSide: 'player',
        turnPhase: 'draw',
        selectionStep: 'none',
        winner: null,
        selectedCardId: null,
        selectedActorId: null,
        selectedTargetId: null,
        hoveredCardId: null,
        detailScroll: 0,
        logScroll: 0,
        enemyActionTimer: 0,
        enemyActionsDone: 0,
        inputQueue: [],
        assets: {
          refs: {},
          warnedMissing: {}
        },
        ui: {
          showLogOverlay: false,
          invalidReason: TEXT.state.none,
          enemyMessage: TEXT.state.enemyIdleMessage,
          effectPreview: {
            visible: false,
            side: 'player',
            cardId: null,
            cardName: '',
            actorName: '',
            message: '',
            startedAt: 0,
            durationMs: 1200
          }
        },
        uiRects: { playerCards: [], monsters: [], buttons: [] },
        temp: { gutsSelectedCardIds: [] },
        field: {
          fire: CONFIG.energy.start,
          thunder: CONFIG.energy.start,
          earth: CONFIG.energy.start
        },
        player: {
          guts: CONFIG.guts.start,
          maxGuts: CONFIG.guts.max,
          monsters: [],
          hand: [],
          deck: [],
          discard: [],
        },
        enemy: {
          guts: CONFIG.guts.start,
          maxGuts: CONFIG.guts.max,
          monsters: [],
          hand: [],
          deck: [],
          discard: [],
        },
        log: [],
      };

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function capitalize(text) {
        if (typeof text !== 'string') return '';
        if (text.length === 0) return '';
        return text.charAt(0).toUpperCase() + text.slice(1);
      }

      function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function getElementColor(element) {
        return CONFIG.colors[element] || '#fff';
      }

      function drawImageOrFallback(img, x, y, w, h, label) {
        if (img && img.complete && !img.failed) {
          ctx.drawImage(img, x, y, w, h);
          return;
        }
        ctx.fillStyle = '#314d7f';
        ctx.fillRect(x, y, w, h);
        ctx.strokeStyle = '#6c8cd0';
        ctx.strokeRect(x, y, w, h);
        ctx.fillStyle = '#d6e4ff';
        ctx.font = '12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(label || 'missing', x + w / 2, y + h / 2 + 4);
      }

      function formatText(template, values) {
        return Object.entries(values).reduce(
          (t, [k, v]) => t.replaceAll(`{${k}}`, `${v}`),
          template
        );
      }

      function appendLog(message) {
        gameState.log.push(message);
        if (gameState.log.length > CONFIG.maxLogEntries) {
          gameState.log.shift();
        }
      }

      function resolveAssetPath(key) {
        if (!key || typeof key !== 'string') return null;
        const [category, name] = key.split('.');
        if (!category || !name) return null;
        const group = ASSETS[category];
        if (!group || typeof group !== 'object') return null;
        return group[name] || null;
      }

      function createImageRef(key, src) {
        const img = new Image();
        const ref = {
          key,
          src,
          image: img,
          ok: false,
          failed: false
        };
        img.onload = () => {
          ref.ok = true;
          ref.failed = false;
        };
        img.onerror = () => {
          ref.ok = false;
          ref.failed = true;
        };
        img.src = src;
        return ref;
      }

      function getImageRef(key) {
        if (!key || typeof key !== 'string') return null;
        const cached = gameState.assets.refs[key];
        if (cached) return cached;

        const path = resolveAssetPath(key);
        if (!path) {
          const missingRef = {
            key,
            src: null,
            image: null,
            ok: false,
            failed: true
          };
          gameState.assets.refs[key] = missingRef;
          return missingRef;
        }

        const created = createImageRef(key, path);
        gameState.assets.refs[key] = created;
        return created;
      }

      function drawAssetOrFallback(key, x, y, w, h, label) {
        const ref = getImageRef(key);
        if (ref && ref.ok && ref.image) {
          ctx.drawImage(ref.image, x, y, w, h);
          return;
        }
        if (ref && ref.failed && !gameState.assets.warnedMissing[key]) {
          console.warn(`[asset-missing] ${key}`);
          gameState.assets.warnedMissing[key] = true;
        }

        ctx.fillStyle = '#314d7f';
        ctx.fillRect(x, y, w, h);
        ctx.strokeStyle = '#6c8cd0';
        ctx.strokeRect(x, y, w, h);
        ctx.fillStyle = '#d6e4ff';
        ctx.font = '12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(label || key || 'missing', x + w / 2, y + h / 2 + 4);
      }

      function setEnemyMessage(message) {
        gameState.ui.enemyMessage = message || TEXT.state.enemyIdleMessage;
      }

      function findCardById(cardId) {
        if (!cardId) return null;
        const pools = [
          gameState.player.hand,
          gameState.player.deck,
          gameState.player.discard,
          gameState.enemy.hand,
          gameState.enemy.deck,
          gameState.enemy.discard
        ];
        for (const pool of pools) {
          const found = pool.find((card) => card.id === cardId);
          if (found) return found;
        }
        return null;
      }

      function showEffectPreview(side, card, actorName, message) {
        if (!card) return;
        const preview = gameState.ui.effectPreview;
        preview.visible = true;
        preview.side = side;
        preview.cardId = card.id ?? null;
        preview.cardName = card.name ?? '';
        preview.actorName = actorName || '';
        preview.message = message || card.name || '';
        preview.startedAt = performance.now();
      }

      function hideEffectPreview() {
        const preview = gameState.ui.effectPreview;
        preview.visible = false;
        preview.side = 'player';
        preview.cardId = null;
        preview.cardName = '';
        preview.actorName = '';
        preview.message = '';
        preview.startedAt = 0;
      }

      function updateEffectPreview(now) {
        const preview = gameState.ui.effectPreview;
        if (!preview.visible) return;
        if (now >= preview.startedAt + preview.durationMs) {
          hideEffectPreview();
        }
      }

      function makeMonster(id, name, element, type, asset) {
        return {
          id,
          name,
          element,
          type,
          asset,
          attackType: element,
          defenseType: element,
          hasActedThisTurn: false,
          hp: CONFIG.hp.base,
          maxHp: CONFIG.hp.base,
          alive: true
        };
      }

      function normalizeEnergySet(value) {
        return {
          fire: value?.fire ?? 0,
          thunder: value?.thunder ?? 0,
          earth: value?.earth ?? 0,
        };
      }

      function makeCard({
        id,
        name,
        asset,
        category = 'atk',
        cardClass,
        timing = 'attack',
        element = null,
        scope = 'common',
        cost = 0,
        requirement = { fire: 0, thunder: 0, earth: 0 },
        enhance = null,
        consume = { fire: 0, thunder: 0, earth: 0 },
        description = '',
        effect = { kind: 'damage', amount: 0 },
        requiredAttackType = null
      }) {
        return {
          id,
          name,
          asset,
          category,
          scope,
          cardClass,
          type: cardClass,
          timing,
          element,
          cost,
          requirement: normalizeEnergySet(requirement),
          enhance: enhance
            ? {
              condition: normalizeEnergySet(enhance.condition),
              bonusDamage: enhance.bonusDamage ?? 0,
              bonusText: enhance.bonusText ?? ''
            }
            : null,
          consume: normalizeEnergySet(consume),
          description,
          effect,
          requiredAttackType
        };
      }

      function shuffle(items) {
        const clone = [...items];
        for (let i = clone.length - 1; i > 0; i -= 1) {
          const j = getRandomInt(0, i);
          [clone[i], clone[j]] = [clone[j], clone[i]];
        }
        return clone;
      }

      function createDeck(ownerPrefix) {
        const set = [
          makeCard({ id: 'atk_fire_common_punch', asset: 'cards.atk_fire_common_punch', name: 'Fire Jab', category: 'atk', cardClass: 'COMMON', element: 'fire', scope: 'common', cost: 2, requirement: { fire: 1, thunder: 0, earth: 0 }, description: 'Deal 22 damage to one enemy.', effect: { kind: 'damage', amount: 22 } }),
          makeCard({ id: 'atk_thunder_common_punch', asset: 'cards.atk_thunder_common_punch', name: 'Bolt Jab', category: 'atk', cardClass: 'COMMON', element: 'thunder', scope: 'common', cost: 2, requirement: { fire: 0, thunder: 1, earth: 0 }, description: 'Deal 22 damage to one enemy.', effect: { kind: 'damage', amount: CONFIG.damage.common } }),
          makeCard({ id: 'atk_earth_common_punch', asset: 'cards.atk_earth_common_punch', name: 'Root Jab', category: 'atk', cardClass: 'COMMON', element: 'earth', scope: 'common', cost: 2, requirement: { fire: 0, thunder: 0, earth: 1 }, description: 'Deal 22 damage to one enemy.', effect: { kind: 'damage', amount: CONFIG.damage.common } }),
          makeCard({ id: 'atk_fire_beast_magmaPunch', asset: 'cards.atk_fire_beast_magmaPunch', name: 'Flame Burst', category: 'atk', cardClass: 'TYPE', element: 'fire', scope: 'beast', cost: 3, requirement: { fire: 2, thunder: 0, earth: 0 }, description: 'Deal 30 damage to one enemy.', effect: { kind: 'damage', amount: CONFIG.damage.type }, requiredAttackType: 'fire' }),
          makeCard({ id: 'atk_thunder_beast_boltBurst', asset: 'cards.atk_thunder_beast_boltBurst', name: 'Thunder Burst', category: 'atk', cardClass: 'TYPE', element: 'thunder', scope: 'beast', cost: 3, requirement: { fire: 0, thunder: 2, earth: 0 }, description: 'Deal 30 damage to one enemy.', effect: { kind: 'damage', amount: CONFIG.damage.type }, requiredAttackType: 'thunder' }),
          makeCard({ id: 'atk_earth_beast_rootBurst', asset: 'cards.atk_earth_beast_rootBurst', name: 'Earth Burst', category: 'atk', cardClass: 'TYPE', element: 'earth', scope: 'beast', cost: 3, requirement: { fire: 0, thunder: 0, earth: 2 }, description: 'Deal 30 damage to one enemy.', effect: { kind: 'damage', amount: CONFIG.damage.type }, requiredAttackType: 'earth' }),
          makeCard({ id: 'sup_fire_common_shard', asset: 'cards.sup_fire_common_shard', name: 'Fire Shard', category: 'sup', cardClass: 'SHARD', element: 'fire', scope: 'common', cost: 0, requirement: { fire: 0, thunder: 0, earth: 0 }, description: 'Gain +1 Guts and +1 Fire Energy.', effect: { kind: 'shard', energy: 'fire' } }),
          makeCard({ id: 'sup_thunder_common_shard', asset: 'cards.sup_thunder_common_shard', name: 'Thunder Shard', category: 'sup', cardClass: 'SHARD', element: 'thunder', scope: 'common', cost: 0, requirement: { fire: 0, thunder: 0, earth: 0 }, description: 'Gain +1 Guts and +1 Thunder Energy.', effect: { kind: 'shard', energy: 'thunder' } }),
          makeCard({ id: 'sup_earth_common_shard', asset: 'cards.sup_earth_common_shard', name: 'Earth Shard', category: 'sup', cardClass: 'SHARD', element: 'earth', scope: 'common', cost: 0, requirement: { fire: 0, thunder: 0, earth: 0 }, description: 'Gain +1 Guts and +1 Earth Energy.', effect: { kind: 'shard', energy: 'earth' } }),
          makeCard({ id: 'atk_neutral_common_raiKa', asset: 'cards.atk_neutral_common_raiKa', name: '雷火', category: 'atk', cardClass: 'COMMON', element: null, scope: 'common', cost: 2, requirement: { fire: 0, thunder: 0, earth: 0 }, enhance: { condition: { fire: 4, thunder: 4, earth: 0 }, bonusDamage: 50, bonusText: 'F4/T4で+50ダメージ' }, consume: { fire: 0, thunder: 0, earth: 0 }, description: 'Deal 40 damage. Enhanced with shared field.', effect: { kind: 'damage', amount: 40 } }),
          makeCard({ id: 'atk_fire_beast_megaFlame', asset: 'cards.atk_fire_beast_megaFlame', name: 'Mega Flame', category: 'atk', cardClass: 'TYPE', element: 'fire', scope: 'beast', cost: 3, requirement: { fire: 5, thunder: 0, earth: 0 }, consume: { fire: 3, thunder: 0, earth: 0 }, description: 'Deal 80 damage. Consume Fire 3.', effect: { kind: 'damage', amount: 80 }, requiredAttackType: 'fire' }),
          makeCard({ id: 'atk_thunder_beast_stormNova', asset: 'cards.atk_thunder_beast_stormNova', name: 'Storm Nova', category: 'atk', cardClass: 'TYPE', element: 'thunder', scope: 'beast', cost: 3, requirement: { fire: 0, thunder: 3, earth: 0 }, enhance: { condition: { fire: 2, thunder: 5, earth: 0 }, bonusDamage: 30, bonusText: 'T5/F2で+30ダメージ' }, consume: { fire: 0, thunder: 2, earth: 0 }, description: 'Deal 45 damage. Enhance and consume Thunder 2.', effect: { kind: 'damage', amount: 45 }, requiredAttackType: 'thunder' }),
        ];
        return shuffle(set);
      }

      function getSideData(side) {
        return side === 'player' ? gameState.player : gameState.enemy;
      }

      function getOpponentSide(side) {
        return side === 'player' ? 'enemy' : 'player';
      }

      function getLivingMonsters(sideData) {
        return sideData.monsters.filter((monster) => monster.alive);
      }

      function getCardFromHand(sideData, cardId) {
        return sideData.hand.find((card) => card.id === cardId) || null;
      }

      function getMonster(sideData, monsterId) {
        return sideData.monsters.find((monster) => monster.id === monsterId) || null;
      }

      function isAttackTypeMatch(card, actor) {
        if (!card || !actor) return true;
        if (card.type !== 'TYPE') return true;
        if (card.scope === 'common') return true;
        if (card.scope && actor.type && card.scope !== actor.type) return false;
        return card.requiredAttackType === actor.attackType;
      }

      function getFieldEnergy() {
        return {
          fire: gameState.field.fire,
          thunder: gameState.field.thunder,
          earth: gameState.field.earth
        };
      }

      function getEnergyShortageReason(requirement) {
        const energy = getFieldEnergy();
        if (energy.fire < (requirement.fire ?? 0)) return TEXT.reason.needFireShared;
        if (energy.thunder < (requirement.thunder ?? 0)) return TEXT.reason.needThunderShared;
        if (energy.earth < (requirement.earth ?? 0)) return TEXT.reason.needEarthShared;
        return '';
      }

      function meetsEnergyRequirement(requirement = { fire: 0, thunder: 0, earth: 0 }) {
        return !getEnergyShortageReason(requirement);
      }

      function canConsumeFieldEnergy(consume = { fire: 0, thunder: 0, earth: 0 }) {
        const energy = getFieldEnergy();
        return (
          energy.fire >= (consume.fire ?? 0) &&
          energy.thunder >= (consume.thunder ?? 0) &&
          energy.earth >= (consume.earth ?? 0)
        );
      }

      function isCardEnhanced(card) {
        if (!card || !card.enhance) return false;
        return meetsEnergyRequirement(card.enhance.condition);
      }

      function getCardFinalDamage(card) {
        const base = card?.effect?.amount ?? 0;
        if (!card || card.effect?.kind !== 'damage') return base;
        if (!isCardEnhanced(card)) return base;
        return base + (card.enhance?.bonusDamage ?? 0);
      }

      function consumeFieldEnergy(consume = { fire: 0, thunder: 0, earth: 0 }) {
        ELEMENTS.forEach((element) => {
          gameState.field[element] = clamp(
            gameState.field[element] - (consume[element] ?? 0),
            0,
            CONFIG.energy.max
          );
        });
      }

      function getCardUsability(side, card, actor = null) {
        const sideData = getSideData(side);
        if (!card) return { playable: false, reason: TEXT.reason.noCard };
        if (card.type === 'SHARD') return { playable: true, reason: TEXT.reason.shardAlways };

        if (sideData.guts < card.cost) {
          return {
            playable: false,
            reason: formatText(TEXT.reason.needGuts, {
              have: sideData.guts,
              need: card.cost
            })
          };
        }

        const requirementReason = getEnergyShortageReason(card.requirement);
        if (requirementReason) {
          return { playable: false, reason: requirementReason };
        }

        if (!canConsumeFieldEnergy(card.consume)) {
          return {
            playable: false,
            reason: TEXT.reason.needConsumeEnergy
          };
        }

        if (card.type === 'TYPE' && actor && !isAttackTypeMatch(card, actor)) {
          return { playable: false, reason: TEXT.reason.typeMismatch };
        }

        return { playable: true, reason: '' };
      }

      function canMonsterAct(monster) {
        return monster.alive && !monster.hasActedThisTurn;
      }

      function getValidActorIds(side) {
        return getSideData(side).monsters
          .filter((monster) => canMonsterAct(monster))
          .map((monster) => monster.id);
      }

      function getActorSelectionValidation(side, monsterId, card) {
        const monster = getMonster(getSideData(side), monsterId);
        if (!monster || !monster.alive) {
          return { valid: false, reason: TEXT.reason.needActor };
        }
        if (monster.hasActedThisTurn) {
          return { valid: false, reason: TEXT.reason.actedActor };
        }
        if (card && card.type === 'TYPE' && !isAttackTypeMatch(card, monster)) {
          return { valid: false, reason: TEXT.reason.typeMismatch };
        }
        return { valid: true, reason: '' };
      }

      function markMonsterActed(side, monsterId) {
        const monster = getMonster(getSideData(side), monsterId);
        if (!monster) return;
        monster.hasActedThisTurn = true;
      }

      function resetMonstersActionState(side) {
        getSideData(side).monsters.forEach((monster) => {
          monster.hasActedThisTurn = false;
        });
      }

      function getValidTargetIds(side, card) {
        if (!card) return [];
        if (card.effect.kind === 'damage') {
          return getLivingMonsters(getSideData(getOpponentSide(side))).map((monster) => monster.id);
        }
        return getLivingMonsters(getSideData(side)).map((monster) => monster.id);
      }

      function spendCardCost(side, card) {
        const sideData = getSideData(side);
        sideData.guts = clamp(sideData.guts - card.cost, 0, sideData.maxGuts);
      }

      function drawUntilHandLimit(side) {
        const sideData = getSideData(side);
        while (sideData.hand.length < CONFIG.handSize && sideData.deck.length > 0) {
          sideData.hand.push(sideData.deck.shift());
        }
      }

      function recoverDrawPhaseGuts(side) {
        const sideData = getSideData(side);
        const aliveCount = getLivingMonsters(sideData).length;
        const gain = CONFIG.drawGutsRecover[aliveCount] ?? 0;
        sideData.guts = clamp(sideData.guts + gain, 0, sideData.maxGuts);
        appendLog(formatText(TEXT.msg.drawRecover, { side: capitalize(side), gain }));
      }

      function moveCardToDiscard(side, cardId) {
        const sideData = getSideData(side);
        const index = sideData.hand.findIndex((card) => card.id === cardId);
        if (index < 0) return null;
        const [card] = sideData.hand.splice(index, 1);
        sideData.discard.push(card);
        return card;
      }

      function gainResourcesFromConversion(side, card) {
        if (!card) return;
        const sideData = getSideData(side);
        sideData.guts = clamp(sideData.guts + CONFIG.guts.convertGain, 0, sideData.maxGuts);
        if (ELEMENTS.includes(card.element)) {
          gameState.field[card.element] = clamp(
            gameState.field[card.element] + CONFIG.energy.convertGain,
            0,
            CONFIG.energy.max
          );
          appendLog(formatText(TEXT.msg.convertEnergy, {
            gain: CONFIG.energy.convertGain,
            element: capitalize(card.element),
          }));
          return;
        }

        appendLog(formatText(TEXT.msg.convertGutsOnly, {
          card: card.name || card.id || 'Card',
          gain: CONFIG.guts.convertGain,
        }));
      }

      function dealDamage(targetSide, targetId, amount) {
        const target = getMonster(getSideData(targetSide), targetId);
        if (!target || !target.alive) return false;

        target.hp = clamp(target.hp - amount, 0, target.maxHp);
        if (target.hp === 0) {
          target.alive = false;
          appendLog(formatText(TEXT.msg.defeated, { name: target.name }));
        }
        return true;
      }

      function applyCard(side, card, actorId, targetId) {
        const actor = getMonster(getSideData(side), actorId);
        const actorName = actor?.name || actorId || '';
        const previewMessage = actorName
          ? formatText(TEXT.preview.usedBy, { actor: actorName, card: card?.name || '' })
          : formatText(
            side === 'enemy' ? TEXT.preview.enemyUsed : TEXT.preview.playerUsed,
            { card: card?.name || '' }
          );
        showEffectPreview(side, card, actorName, previewMessage);

        spendCardCost(side, card);

        if (card.effect.kind === 'damage') {
          const enhanced = isCardEnhanced(card);
          const finalDamage = getCardFinalDamage(card);
          const ok = dealDamage(getOpponentSide(side), targetId, finalDamage);
          if (!ok) return false;

          appendLog(formatText(TEXT.msg.cardUsedDamage, {
            side: capitalize(side),
            card: card.name,
            actor: actorId,
            target: targetId,
            amount: finalDamage,
          }));
          if (enhanced) {
            appendLog(formatText(TEXT.msg.cardEnhanced, { card: card.name }));
            appendLog(formatText(TEXT.msg.cardEnhancedBonus, {
              card: card.name,
              bonus: card.enhance?.bonusDamage ?? 0
            }));
          }
        }

        if (card.effect.kind === 'shard') {
          const sideData = getSideData(side);
          sideData.guts = clamp(
            sideData.guts + CONFIG.energy.shardGain,
            0,
            sideData.maxGuts
          );
          gameState.field[card.effect.energy] = clamp(
            gameState.field[card.effect.energy] + CONFIG.energy.shardGain,
            0,
            CONFIG.energy.max
          );

          appendLog(formatText(TEXT.msg.cardUsedShard, {
            side: capitalize(side),
            card: card.name,
            actor: actorId,
            target: targetId,
            energy: capitalize(card.effect.energy),
          }));
        }

        if (canConsumeFieldEnergy(card.consume)) {
          consumeFieldEnergy(card.consume);
          const consumeParts = ELEMENTS
            .filter((element) => (card.consume?.[element] ?? 0) > 0)
            .map((element) => `${capitalize(element)} ${card.consume[element]}`);
          if (consumeParts.length > 0) {
            appendLog(formatText(TEXT.msg.cardConsume, {
              card: card.name,
              detail: consumeParts.join(', ')
            }));
          }
        }

        return true;
      }

      function clearSelection() {
        gameState.selectedCardId = null;
        gameState.selectedActorId = null;
        gameState.selectedTargetId = null;
        gameState.selectionStep = 'none';
        gameState.ui.invalidReason = TEXT.state.none;
      }

      function cancelSelection(reasonText) {
        clearSelection();
        if (reasonText) appendLog(reasonText);
      }

      function startTurn(side) {
        gameState.turnSide = side;
        gameState.turnPhase = 'draw';
        gameState.enemyActionsDone = 0;
        resetMonstersActionState(side);
        clearSelection();
        gameState.temp.gutsSelectedCardIds = [];
        if (side === 'enemy') setEnemyMessage('カードを引くぜ！');
        else setEnemyMessage(TEXT.state.enemyIdleMessage);
        runDrawPhase(side);
      }

      function runDrawPhase(side) {
        drawUntilHandLimit(side);
        recoverDrawPhaseGuts(side);
        gameState.turnPhase = 'attack';
        appendLog(formatText(TEXT.msg.attackStart, { side: capitalize(side) }));
        if (side === 'enemy') {
          setEnemyMessage('攻撃するぜ！');
          gameState.enemyActionTimer = performance.now() + 450;
        }
      }

      function finishTurn() {
        const nextSide = getOpponentSide(gameState.turnSide);
        startTurn(nextSide);
      }

      function runEnemyGutsPhase() {
        setEnemyMessage('宵越しのカードは残さないよ！');
        const enemyCardIds = gameState.enemy.hand.map((card) => card.id);
        applyGutsConversion('enemy', enemyCardIds);
        finishTurn();
      }

      function checkWinCondition() {
        if (gameState.phase === 'gameover') return;

        const playerAlive = getLivingMonsters(gameState.player).length;
        const enemyAlive = getLivingMonsters(gameState.enemy).length;

        if (playerAlive === 0 || enemyAlive === 0) {
          gameState.phase = 'gameover';
          gameState.winner = enemyAlive === 0 ? 'player' : 'enemy';
          appendLog(formatText(TEXT.msg.win, { side: capitalize(gameState.winner) }));
          clearSelection();
        }
      }

      function beginPlayerCardSelection(cardId) {
        if (gameState.turnPhase !== 'attack') {
          gameState.ui.invalidReason = TEXT.reason.waitAttackPhase;
          appendLog(formatText(TEXT.msg.invalidCard, { reason: TEXT.reason.waitAttackPhase }));
          return;
        }

        if (gameState.selectedCardId === cardId) {
          cancelSelection(TEXT.msg.cancelSelection);
          return;
        }

        const card = getCardFromHand(gameState.player, cardId);
        const usability = getCardUsability('player', card);

        if (!usability.playable) {
          gameState.ui.invalidReason = usability.reason;
          appendLog(formatText(TEXT.msg.invalidCard, { reason: usability.reason }));
          clearSelection();
          return;
        }

        gameState.selectedCardId = cardId;
        gameState.selectionStep = 'selectActor';
        gameState.selectedActorId = null;
        gameState.selectedTargetId = null;
        gameState.ui.invalidReason = TEXT.state.none;
        appendLog(formatText(TEXT.msg.selectCard, { card: card.name }));
      }

      function trySelectActor(monsterId) {
        if (gameState.selectionStep !== 'selectActor') return;

        const card = getCardFromHand(gameState.player, gameState.selectedCardId);
        const validation = getActorSelectionValidation('player', monsterId, card);
        if (!validation.valid) {
          gameState.ui.invalidReason = validation.reason;
          return;
        }

        gameState.selectedActorId = monsterId;
        gameState.selectionStep = 'selectTarget';
        appendLog(TEXT.msg.selectActor);
      }

      function trySelectTargetAndResolve(monsterId) {
        if (gameState.selectionStep !== 'selectTarget') return;

        const card = getCardFromHand(gameState.player, gameState.selectedCardId);
        if (!card) {
          clearSelection();
          return;
        }

        if (!getValidTargetIds('player', card).includes(monsterId)) {
          gameState.ui.invalidReason = TEXT.reason.needTarget;
          appendLog(TEXT.msg.invalidTarget);
          return;
        }

        gameState.selectedTargetId = monsterId;
        const applied = applyCard('player', card, gameState.selectedActorId, gameState.selectedTargetId);

        if (applied) {
          if (card.effect.kind === 'damage') {
            markMonsterActed('player', gameState.selectedActorId);
          }
          moveCardToDiscard('player', card.id);
        }

        clearSelection();
        checkWinCondition();
      }

      function endPlayerAttackPhase() {
        gameState.turnPhase = 'guts';
        gameState.temp.gutsSelectedCardIds = [];
        clearSelection();
      }

      function togglePlayerGutsCard(cardId) {
        if (gameState.turnSide !== 'player' || gameState.turnPhase !== 'guts') return;

        const ids = gameState.temp.gutsSelectedCardIds;
        const index = ids.indexOf(cardId);
        if (index >= 0) ids.splice(index, 1);
        else ids.push(cardId);
      }

      function applyGutsConversion(side, cardIds) {
        let converted = 0;
        cardIds.forEach((cardId) => {
          const moved = moveCardToDiscard(side, cardId);
          if (moved) {
            converted += 1;
            gainResourcesFromConversion(side, moved);
          }
        });
        appendLog(formatText(
          side === 'player' ? TEXT.msg.playerConvert : TEXT.msg.enemyConvert,
          { n: converted }
        ));
      }

      function convertSelectedPlayerCards() {
        if (gameState.turnSide !== 'player' || gameState.turnPhase !== 'guts') return;
        const selectedIds = [...gameState.temp.gutsSelectedCardIds];
        applyGutsConversion('player', selectedIds);
        gameState.temp.gutsSelectedCardIds = [];
      }

      function finishPlayerGutsPhase() {
        if (gameState.turnSide !== 'player' || gameState.turnPhase !== 'guts') return;
        convertSelectedPlayerCards();
        finishTurn();
      }

      function runEnemyAttackStep() {
        if (gameState.turnSide !== 'enemy' || gameState.turnPhase !== 'attack') return;
        if (gameState.enemy.monsters.filter((m) => m.alive).length <= 1) {
          setEnemyMessage('ピンチだぜぃ！');
        } else {
          setEnemyMessage('攻撃するぜ！');
        }

        const playable = gameState.enemy.hand.filter((card) => getCardUsability('enemy', card).playable);

        if (playable.length === 0 || gameState.enemyActionsDone >= CONFIG.MAX_ACTIONS_PER_TURN) {
          gameState.turnPhase = 'guts';
          runEnemyGutsPhase();
          return;
        }

        const card = playable[0];
        const actorIds = getValidActorIds('enemy').filter((actorId) => {
          const actor = getMonster(gameState.enemy, actorId);
          return actor && isAttackTypeMatch(card, actor);
        });
        const targetIds = getValidTargetIds('enemy', card);

        if (actorIds.length === 0 || targetIds.length === 0) {
          gameState.turnPhase = 'guts';
          runEnemyGutsPhase();
          return;
        }

        const actorId = actorIds[0];
        const targetId = targetIds[0];

        const applied = applyCard('enemy', card, actorId, targetId);
        if (applied) {
          if (card.effect.kind === 'damage') {
            markMonsterActed('enemy', actorId);
          }
          moveCardToDiscard('enemy', card.id);
          gameState.enemyActionsDone += 1;
        }
        checkWinCondition();
      }

      function onActionButton(action) {
        if (action === 'toggleLog') {
          gameState.ui.showLogOverlay = !gameState.ui.showLogOverlay;
          return;
        }

        if (action === 'closeLog') {
          gameState.ui.showLogOverlay = false;
          return;
        }

        if (gameState.turnSide !== 'player') return;

        if (action === 'cancel') {
          cancelSelection(TEXT.msg.cancelSelection);
          gameState.temp.gutsSelectedCardIds = [];
          return;
        }

        if (action === 'endAttack' && gameState.turnPhase === 'attack') {
          endPlayerAttackPhase();
          return;
        }

        if (action === 'endTurn' && gameState.turnPhase === 'guts') {
          finishPlayerGutsPhase();
        }
      }

      function handleCanvasClick(x, y) {
        const buttonHit = getHitRect(gameState.uiRects.buttons, x, y);
        if (buttonHit) {
          onActionButton(buttonHit.action);
          return;
        }

        if (gameState.ui.showLogOverlay) return;

        const monsterHit = getHitRect(gameState.uiRects.monsters, x, y);
        if (monsterHit && gameState.turnSide === 'player' && gameState.turnPhase === 'attack') {
          if (monsterHit.side === 'player') {
            trySelectActor(monsterHit.id);
            return;
          }
          if (monsterHit.side === 'enemy') {
            trySelectTargetAndResolve(monsterHit.id);
            return;
          }
        }

        const cardHit = getHitRect(gameState.uiRects.playerCards, x, y);
        if (cardHit && gameState.turnSide === 'player') {
          if (gameState.turnPhase === 'attack') {
            beginPlayerCardSelection(cardHit.id);
            return;
          }
          if (gameState.turnPhase === 'guts') {
            togglePlayerGutsCard(cardHit.id);
          }
        }
      }

      function update() {
        if (gameState.phase !== 'playing') return;
        const now = performance.now();

        while (gameState.inputQueue.length > 0) {
          const event = gameState.inputQueue.shift();
          if (event.type === 'click') {
            handleCanvasClick(event.x, event.y);
          }
        }

        if (
          gameState.turnSide === 'enemy' &&
          gameState.turnPhase === 'attack' &&
          now >= gameState.enemyActionTimer
        ) {
          gameState.enemyActionTimer = now + 700;
          runEnemyAttackStep();
        }

        updateEffectPreview(now);
        checkWinCondition();
      }

      function drawPanel(x, y, width, height) {
        ctx.fillStyle = CONFIG.colors.panel;
        ctx.fillRect(x, y, width, height);
        ctx.strokeStyle = CONFIG.colors.border;
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, width, height);
      }

      function drawButton(x, y, label, action, enabled) {
        ctx.fillStyle = enabled ? CONFIG.colors.button : CONFIG.colors.buttonOff;
        ctx.fillRect(x, y, CONFIG.button.width, CONFIG.button.height);
        ctx.strokeStyle = '#82a3db';
        ctx.lineWidth = 1;
        ctx.strokeRect(x, y, CONFIG.button.width, CONFIG.button.height);

        ctx.fillStyle = enabled ? '#fff' : '#9fb4dd';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = 'bold 14px Arial';
        ctx.fillText(label, x + CONFIG.button.width / 2, y + CONFIG.button.height / 2);
        
        gameState.uiRects.buttons.push({
          x,
          y,
          w: CONFIG.button.width,
          h: CONFIG.button.height,
          action,
          enabled
        });
      }

      function drawElementPill(element, x, y, value, max) {
        ctx.fillStyle = getElementColor(element);
        ctx.fillRect(x, y, 98, 20);
        ctx.fillStyle = '#111';
        ctx.font = 'bold 12px Arial';
        ctx.textAlign = 'left';
        ctx.fillText(`${capitalize(element)} ${value}/${max}`, x + 6, y + 14);
      }

      function getTurnBannerText() {
        let text = TEXT.turn.playerAttack;
        if (gameState.phase === 'gameover') {
          return gameState.winner === 'player'
            ? TEXT.turn.gameoverPlayer
            : TEXT.turn.gameoverEnemy;
        }
        if (gameState.turnSide === 'enemy') {
          return gameState.turnPhase === 'guts'
            ? TEXT.turn.enemyGuts
            : TEXT.turn.enemyAttack;
        }
        if (gameState.turnPhase === 'guts') {
          return TEXT.turn.playerGuts;
        }
        return text;
      }

      function drawMonsterCard(monster, side, x, y) {
        drawPanel(x, y, CONFIG.monsterCard.width, CONFIG.monsterCard.height);

        const card = getCardFromHand(gameState.player, gameState.selectedCardId);
        const validActor =
          gameState.selectionStep === 'selectActor' &&
          side === 'player' &&
          getValidActorIds('player').includes(monster.id);

        const validTarget =
          gameState.selectionStep === 'selectTarget' &&
          side === 'enemy' &&
          card &&
          getValidTargetIds('player', card).includes(monster.id);

        const selectedActor = gameState.selectedActorId === monster.id;
        const selectedTarget = gameState.selectedTargetId === monster.id;
        const acted =
          monster.alive &&
          monster.hasActedThisTurn &&
          gameState.turnPhase === 'attack' &&
          gameState.turnSide === side;

        if (validActor) {
          ctx.fillStyle = CONFIG.colors.actorSoft;
          ctx.fillRect(x + 2, y + 2, CONFIG.monsterCard.width - 4, CONFIG.monsterCard.height - 4);
        }

        if (validTarget) {
          ctx.fillStyle = CONFIG.colors.targetSoft;
          ctx.fillRect(x + 2, y + 2, CONFIG.monsterCard.width - 4, CONFIG.monsterCard.height - 4);
        }

        if (selectedActor) {
          ctx.strokeStyle = CONFIG.colors.actorStrong;
          ctx.lineWidth = 4;
          ctx.strokeRect(x + 2, y + 2, CONFIG.monsterCard.width - 4, CONFIG.monsterCard.height - 4);
        }

        if (selectedTarget) {
          ctx.strokeStyle = CONFIG.colors.targetStrong;
          ctx.lineWidth = 4;
          ctx.strokeRect(x + 2, y + 2, CONFIG.monsterCard.width - 4, CONFIG.monsterCard.height - 4);
        }

        drawAssetOrFallback(
          monster.asset,
          x + 10,
          y + 10,
          CONFIG.monsterCard.width - 20,
          CONFIG.monsterCard.iconSize,
          monster.id
        );

        ctx.fillStyle = '#fff';
        ctx.textAlign = 'left';
        ctx.font = 'bold 15px Arial';
        ctx.fillText(monster.name, x + 12, y + CONFIG.monsterCard.iconSize + 30);
        ctx.font = '12px Arial';
        ctx.fillStyle = '#c9dcff';
        ctx.fillText(`ATK:${monster.attackType} DEF:${monster.defenseType}`, x + 12, y + CONFIG.monsterCard.iconSize + 48);

        drawMonsterHpBar(monster, x + 12, y + CONFIG.monsterCard.iconSize + 58, CONFIG.monsterCard.hpBarWidth, CONFIG.monsterCard.hpBarHeight);

        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 26px Arial';
        ctx.fillText(`HP ${monster.hp}`, x + 12, y + CONFIG.monsterCard.height - 12);

        if (acted) {
          ctx.fillStyle = 'rgba(10, 14, 24, 0.48)';
          ctx.fillRect(x, y, CONFIG.monsterCard.width, CONFIG.monsterCard.height);
          ctx.fillStyle = '#ffd073';
          ctx.font = 'bold 14px Arial';
          ctx.fillText('ACTED', x + 12, y + 24);
        }

        if (!monster.alive) {
          ctx.fillStyle = CONFIG.colors.dead;
          ctx.fillRect(x, y, CONFIG.monsterCard.width, CONFIG.monsterCard.height);
        }

        gameState.uiRects.monsters.push({
          id: monster.id,
          side,
          x,
          y,
          w: CONFIG.monsterCard.width,
          h: CONFIG.monsterCard.height
        });
      }

      function drawMonsterHpBar(monster, x, y, w, h) {
        ctx.fillStyle = '#3e2531';
        ctx.fillRect(x, y, w, h);
        const ratio = monster.maxHp > 0 ? monster.hp / monster.maxHp : 0;
        ctx.fillStyle = CONFIG.colors.hp;
        ctx.fillRect(x, y, w * ratio, h);
        ctx.strokeStyle = '#8ea8d9';
        ctx.lineWidth = 1;
        ctx.strokeRect(x, y, w, h);
      }

      function drawBattleArea() {
        drawPanel(CONFIG.monsterArea.x, CONFIG.monsterArea.y, CONFIG.monsterArea.width, CONFIG.monsterArea.height);

        gameState.enemy.monsters.forEach((monster, index) => {
          const x = CONFIG.monsterArea.x + 10 + index * (CONFIG.monsterCard.width + CONFIG.monsterCard.gap);
          drawMonsterCard(monster, 'enemy', x, CONFIG.monsterArea.y + 10);
        });

        gameState.player.monsters.forEach((monster, index) => {
          const x = CONFIG.monsterArea.x + 10 + index * (CONFIG.monsterCard.width + CONFIG.monsterCard.gap);
          drawMonsterCard(monster, 'player', x, CONFIG.monsterArea.y + 186);
        });

        if (gameState.ui.effectPreview.visible) {
          const side = gameState.ui.effectPreview.side;
          const halfWidth = CONFIG.monsterArea.width / 2;
          const tintX = side === 'player' ? CONFIG.monsterArea.x : CONFIG.monsterArea.x + halfWidth;
          ctx.fillStyle = 'rgba(149, 202, 255, 0.08)';
          ctx.fillRect(tintX, CONFIG.monsterArea.y, halfWidth, CONFIG.monsterArea.height);
        }
      }

      function drawEffectPreview() {
        const preview = gameState.ui.effectPreview;
        if (!preview.visible) return;

        const panelW = 330;
        const panelH = 400;
        const panelX = preview.side === 'player' ? 120 : CONFIG.w - panelW - 120;
        const panelY = Math.floor((CONFIG.h - panelH) / 2);

        const card = findCardById(preview.cardId);
        const cardName = preview.cardName || card?.name || 'Unknown Card';

        ctx.save();
        ctx.fillStyle = 'rgba(6, 12, 22, 0.35)';
        ctx.fillRect(0, 0, CONFIG.w, CONFIG.h);

        ctx.fillStyle = 'rgba(22, 38, 70, 0.95)';
        ctx.fillRect(panelX, panelY, panelW, panelH);
        ctx.strokeStyle = '#9ad7ff';
        ctx.lineWidth = 3;
        ctx.strokeRect(panelX, panelY, panelW, panelH);

        ctx.shadowColor = 'rgba(130, 214, 255, 0.45)';
        ctx.shadowBlur = 14;
        ctx.strokeStyle = 'rgba(130, 214, 255, 0.85)';
        ctx.lineWidth = 2;
        ctx.strokeRect(panelX + 6, panelY + 6, panelW - 12, panelH - 12);
        ctx.shadowBlur = 0;

        drawAssetOrFallback(
          card?.asset || preview.cardId,
          panelX + 20,
          panelY + 26,
          panelW - 40,
          220,
          cardName
        );

        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'left';
        ctx.font = 'bold 28px Arial';
        ctx.fillText(cardName, panelX + 20, panelY + 280);

        if (preview.actorName) {
          ctx.font = '16px Arial';
          ctx.fillStyle = '#cde1ff';
          ctx.fillText(preview.actorName, panelX + 20, panelY + 310);
        }

        ctx.font = 'bold 22px Arial';
        ctx.fillStyle = '#ffe08e';
        ctx.fillText(preview.message || cardName, panelX + 20, panelY + 350);
        ctx.restore();
      }

      function drawEnemyMessageBox(x, y, width, height) {
        drawPanel(x, y, width, height);
        ctx.fillStyle = '#dfe9ff';
        ctx.textAlign = 'left';
        ctx.font = 'bold 14px Arial';
        ctx.fillText('Enemy Message', x + 10, y + 20);
        ctx.font = '15px Arial';
        const msgLines = wrapText(gameState.ui.enemyMessage, width - 20).slice(0, 2);
        msgLines.forEach((line, idx) => {
          ctx.fillText(line, x + 10, y + 44 + idx * 20);
        });

        if (gameState.ui.effectPreview.visible) {
          const side = gameState.ui.effectPreview.side;
          const halfWidth = CONFIG.monsterArea.width / 2;
          const tintX = side === 'player' ? CONFIG.monsterArea.x : CONFIG.monsterArea.x + halfWidth;
          ctx.fillStyle = 'rgba(149, 202, 255, 0.08)';
          ctx.fillRect(tintX, CONFIG.monsterArea.y, halfWidth, CONFIG.monsterArea.height);
        }
      }

      function drawEnemyIconBox(x, y, width, height) {
        drawPanel(x, y, width, height);
        drawAssetOrFallback('monsters.enemy_beast_bear', x + 8, y + 8, width - 16, height - 16, 'enemy');
      }

      function drawMiniEnemyHand(x, y, width, height) {
        drawPanel(x, y, width, height);
        ctx.fillStyle = '#dfe9ff';
        ctx.textAlign = 'left';
        ctx.font = 'bold 13px Arial';
        ctx.fillText('Enemy Hand', x + 10, y + 18);

        const startX = x + 10;
        const cardY = y + 26;
        const maxVisible = Math.max(1, Math.floor((width - 20) / (CONFIG.enemyMiniCard.width + CONFIG.enemyMiniCard.gap)));
        gameState.enemy.hand.slice(0, maxVisible).forEach((card, index) => {
          const cardX = startX + index * (CONFIG.enemyMiniCard.width + CONFIG.enemyMiniCard.gap);
          drawAssetOrFallback(
            card.asset,
            cardX,
            cardY,
            CONFIG.enemyMiniCard.width,
            CONFIG.enemyMiniCard.height,
            card.name
          );
          ctx.strokeStyle = '#86a4dc';
          ctx.lineWidth = 1;
          ctx.strokeRect(cardX, cardY, CONFIG.enemyMiniCard.width, CONFIG.enemyMiniCard.height);
        });
      }

      function drawEnemyInfoPanel(x, y, width, height) {
        drawPanel(x, y, width, height);
        const enemyDeckMax = gameState.enemy.deck.length + gameState.enemy.discard.length + gameState.enemy.hand.length;
        ctx.textAlign = 'left';
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 17px Arial';
        ctx.fillText(`Hand ×${gameState.enemy.hand.length}   Guts ${gameState.enemy.guts}`, x + 10, y + 34);
        ctx.font = '13px Arial';
        ctx.fillStyle = '#d7e4ff';
        ctx.fillText(`Deck ${gameState.enemy.deck.length} / ${enemyDeckMax}`, x + 10, y + 58);
        ctx.fillText(`Discard ${gameState.enemy.discard.length}`, x + 10, y + 78);
      }

      function drawPlayerCard(card, x, y, hover) {
        const usability = getCardUsability('player', card);
        const selectedForGuts = gameState.temp.gutsSelectedCardIds.includes(card.id);

        const scale = hover ? 1.04 : 1;
        const width = CONFIG.handCard.width * scale;
        const height = CONFIG.handCard.height * scale;
        const dx = x - (width - CONFIG.handCard.width) / 2;
        const dy = y - (height - CONFIG.handCard.height) / 2;

        drawPanel(dx, dy, width, height);

        if (hover) {
          ctx.strokeStyle = CONFIG.colors.playableGlow;
          ctx.lineWidth = 3;
          ctx.strokeRect(dx + 1, dy + 1, width - 2, height - 2);
        }

        if (gameState.selectedCardId === card.id) {
          ctx.strokeStyle = '#ffe06d';
          ctx.lineWidth = 4;
          ctx.strokeRect(dx + 2, dy + 2, width - 4, height - 4);
        }

        if (selectedForGuts) {
          ctx.strokeStyle = '#71ffb4';
          ctx.lineWidth = 4;
          ctx.strokeRect(dx + 6, dy + 6, width - 12, height - 12);
        }

        drawAssetOrFallback(card.asset, dx + 10, dy + 8, width - 20, 70, card.id);

        ctx.fillStyle = '#fff';
        ctx.textAlign = 'left';
        ctx.font = 'bold 13px Arial';
        ctx.fillText(card.name, dx + 8, dy + 92);
        ctx.font = '12px Arial';
        const typeText = card.type === 'TYPE' && card.requiredAttackType
          ? `${card.type}(${card.requiredAttackType})`
          : card.type;
        ctx.fillText(`${typeText} / Cost ${card.cost}`, dx + 8, dy + 108);
        ctx.fillText(`Req F${card.requirement.fire} T${card.requirement.thunder} E${card.requirement.earth}`, dx + 8, dy + 124);

        if (!usability.playable && gameState.turnPhase === 'attack') {
          ctx.fillStyle = CONFIG.colors.cardDisabled;
          ctx.fillRect(dx, dy, width, height);
        }

        gameState.uiRects.playerCards.push({
          id: card.id,
          x: dx,
          y: dy,
          w: width,
          h: height
        });
      }

      function drawPlayerHandArea() {
        drawPanel(CONFIG.playerHandArea.x, CONFIG.playerHandArea.y, CONFIG.playerHandArea.width, CONFIG.playerHandArea.height);

        ctx.fillStyle = '#fff';
        ctx.textAlign = 'left';
        ctx.font = 'bold 15px Arial';
        ctx.fillText(TEXT.panel.playerHand, CONFIG.playerHandArea.x + 10, CONFIG.playerHandArea.y + 20);

        gameState.player.hand.forEach((card, index) => {
          const x = CONFIG.playerHandArea.x + 10 + index * (CONFIG.handCard.width + CONFIG.handCard.gap);
          drawPlayerCard(card, x, CONFIG.playerHandArea.y + 28, gameState.hoveredCardId === card.id);
        });
      }

      function drawMiddleBand() {
        drawPanel(CONFIG.middleBand.x, CONFIG.middleBand.y, CONFIG.middleBand.width, CONFIG.middleBand.height);
        drawPanel(CONFIG.turnBanner.x, CONFIG.turnBanner.y, CONFIG.turnBanner.width, CONFIG.turnBanner.height);

        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.font = 'bold 20px Arial';
        ctx.fillText(
          getTurnBannerText(),
          CONFIG.turnBanner.x + CONFIG.turnBanner.width / 2,
          CONFIG.turnBanner.y + 23
        );

        const buttonY = CONFIG.middleBand.y + 6;
        const endTurnX = CONFIG.middleBand.x + CONFIG.middleBand.width - (CONFIG.button.width * 2 + CONFIG.button.gap + 12);
        drawButton(
          endTurnX,
          buttonY,
          gameState.turnPhase === 'guts' ? TEXT.button.finishTurn : TEXT.button.endAttack,
          gameState.turnPhase === 'guts' ? 'endTurn' : 'endAttack',
          gameState.turnSide === 'player'
        );
        drawButton(
          endTurnX + CONFIG.button.width + CONFIG.button.gap,
          buttonY,
          TEXT.button.log,
          'toggleLog',
          true
        );
      }

      function drawEnemyHeader() {
        const layout = getEnemyHeaderLayout();
        drawPanel(
          layout.panel.x,
          layout.panel.y,
          layout.panel.width,
          layout.panel.height
        );
        drawEnemyMessageBox(layout.message.x, layout.message.y, layout.message.width, layout.message.height);
        drawEnemyIconBox(layout.icon.x, layout.icon.y, layout.icon.width, layout.icon.height);
        drawMiniEnemyHand(layout.miniHand.x, layout.miniHand.y, layout.miniHand.width, layout.miniHand.height);
        drawEnemyInfoPanel(layout.info.x, layout.info.y, layout.info.width, layout.info.height);
      }

      function getEnemyHeaderLayout() {
        const sections = CONFIG.enemyHeaderSections;
        const panel = CONFIG.enemyHeader;
        const gap = sections.gap;
        const innerX = panel.x + 10;
        const innerY = panel.y + 10;
        const innerH = panel.height - 20;
        const messageW = sections.message;
        const iconW = sections.icon;
        const infoW = sections.info;
        const miniW = panel.width - 20 - messageW - iconW - infoW - gap * 3;

        return {
          panel,
          message: { x: innerX, y: innerY, width: messageW, height: innerH },
          icon: { x: innerX + messageW + gap, y: innerY, width: iconW, height: innerH },
          miniHand: { x: innerX + messageW + gap + iconW + gap, y: innerY, width: miniW, height: innerH },
          info: { x: innerX + messageW + gap + iconW + gap + miniW + gap, y: innerY, width: infoW, height: innerH },
        };
      }

      function getSelectedCard() {
        return getCardFromHand(gameState.player, gameState.selectedCardId);
      }

      function getSelectionStatusText() {
        if (!gameState.selectedCardId) return 'Selection: none';
        return `Selection: ${gameState.selectionStep}`;
      }

      function wrapText(text, maxWidth) {
        const words = text.split(' ');
        const lines = [];
        let current = '';

        words.forEach((word) => {
          const candidate = current ? `${current} ${word}` : word;
          if (ctx.measureText(candidate).width > maxWidth && current) {
            lines.push(current);
            current = word;
          } else {
            current = candidate;
          }
        });

        if (current) lines.push(current);
        return lines;
      }

      function drawContextPanel() {
        drawPanel(CONFIG.contextPanel.x, CONFIG.contextPanel.y, CONFIG.contextPanel.width, CONFIG.contextPanel.height);

        ctx.fillStyle = '#fff';
        ctx.textAlign = 'left';
        ctx.font = 'bold 24px Arial';
        ctx.fillText(TEXT.panel.contextTitle, CONFIG.contextPanel.x + 12, CONFIG.contextPanel.y + 34);

        const card = getSelectedCard() || getCardFromHand(gameState.player, gameState.hoveredCardId);
        let y = CONFIG.contextPanel.y + 62;

        if (!card) {
          y = drawEmptyContextHint(y);
        } else {
          y = drawContextCardDetails(card, y);
        }

        y += 28;
        ctx.fillStyle = '#fff';
        ctx.font = '16px Arial';
        ctx.fillText(getSelectionStatusText(), CONFIG.contextPanel.x + 12, y);
        y += 22;
        ctx.fillText(`Actor: ${gameState.selectedActorId || 'none'}`, CONFIG.contextPanel.x + 12, y);
        y += 22;
        ctx.fillText(`Target: ${gameState.selectedTargetId || 'none'}`, CONFIG.contextPanel.x + 12, y);
        y += 22;

        if (gameState.ui.invalidReason !== TEXT.state.none) {
          ctx.fillStyle = '#ffb8be';
          ctx.fillText(`Reason: ${gameState.ui.invalidReason}`, CONFIG.contextPanel.x + 12, y);
        }
      }

      function drawEmptyContextHint(startY) {
        ctx.font = '17px Arial';
        ctx.fillStyle = CONFIG.colors.muted;
        ctx.fillText('Hover or select a card to inspect.', CONFIG.contextPanel.x + 12, startY);
        return startY;
      }

      function prepareContextCardDetails(card) {
        const selectedActor = getMonster(gameState.player, gameState.selectedActorId);
        return {
          card,
          usability: getCardUsability('player', card, selectedActor),
          enhanced: isCardEnhanced(card),
          baseDamage: card.effect.kind === 'damage' ? card.effect.amount : 0,
          enhanceCondition: card.enhance?.condition ?? { fire: 0, thunder: 0, earth: 0 },
          enhanceBonus: card.enhance?.bonusDamage ?? 0,
          consume: card.consume ?? { fire: 0, thunder: 0, earth: 0 },
          descriptionLines: wrapText(card.description, CONFIG.contextPanel.width - 24).slice(0, 2),
        };
      }

      function drawContextCardDetails(card, startY) {
        const details = prepareContextCardDetails(card);
        let y = startY;

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 18px Arial';
        ctx.fillText(details.card.name, CONFIG.contextPanel.x + 12, y);
        y += 24;

        ctx.font = '15px Arial';
        ctx.fillText(`Type: ${details.card.type} / Cost: ${details.card.cost}`, CONFIG.contextPanel.x + 12, y);
        y += 20;
        if (details.card.type === 'TYPE' && details.card.requiredAttackType) {
          ctx.fillText(`Required ATK Type: ${details.card.requiredAttackType}`, CONFIG.contextPanel.x + 12, y);
          y += 20;
        }

        ctx.fillText(`Base: ${details.baseDamage}`, CONFIG.contextPanel.x + 12, y);
        y += 20;
        ctx.fillText(`Requirement: F${details.card.requirement.fire} / T${details.card.requirement.thunder} / E${details.card.requirement.earth}`, CONFIG.contextPanel.x + 12, y);
        y += 20;
        ctx.fillText(`Enhance: F${details.enhanceCondition.fire} / T${details.enhanceCondition.thunder} / E${details.enhanceCondition.earth}`, CONFIG.contextPanel.x + 12, y);
        y += 20;
        ctx.fillText(`Bonus: +${details.enhanceBonus}`, CONFIG.contextPanel.x + 12, y);
        y += 20;
        ctx.fillText(`Consume: F${details.consume.fire} / T${details.consume.thunder} / E${details.consume.earth}`, CONFIG.contextPanel.x + 12, y);
        y += 20;
        ctx.fillText(`Current: ${details.enhanced ? 'ENHANCED' : 'enhance inactive'}`, CONFIG.contextPanel.x + 12, y);
        y += 22;

        details.descriptionLines.forEach((line) => {
          ctx.fillText(line, CONFIG.contextPanel.x + 12, y);
          y += 18;
        });

        y += 4;
        ctx.fillStyle = details.usability.playable ? '#8df4a1' : '#ff9ea1';
        ctx.fillText(
          details.usability.playable ? 'Usable now' : `Unusable: ${details.usability.reason}`,
          CONFIG.contextPanel.x + 12,
          y
        );
        return y;
      }

      function drawBattleInfoPanel() {
        drawPanel(CONFIG.fieldPanel.x, CONFIG.fieldPanel.y, CONFIG.fieldPanel.width, CONFIG.fieldPanel.height);

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 22px Arial';
        ctx.textAlign = 'left';
        ctx.fillText(TEXT.panel.battleInfoTitle, CONFIG.fieldPanel.x + 12, CONFIG.fieldPanel.y + 30);

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 28px Arial';
        ctx.fillText(`Player Guts ${gameState.player.guts} / ${gameState.player.maxGuts}`, CONFIG.fieldPanel.x + 12, CONFIG.fieldPanel.y + 78);

        drawElementPill('fire', CONFIG.fieldPanel.x + 12, CONFIG.fieldPanel.y + 98, gameState.field.fire, CONFIG.energy.max);
        drawElementPill('thunder', CONFIG.fieldPanel.x + 122, CONFIG.fieldPanel.y + 98, gameState.field.thunder, CONFIG.energy.max);
        drawElementPill('earth', CONFIG.fieldPanel.x + 232, CONFIG.fieldPanel.y + 98, gameState.field.earth, CONFIG.energy.max);

        ctx.fillStyle = CONFIG.colors.muted;
        ctx.font = '14px Arial';
        const playerDeckMax = gameState.player.deck.length + gameState.player.discard.length + gameState.player.hand.length;
        ctx.fillText(`Deck ${gameState.player.deck.length} / ${playerDeckMax}   Discard ${gameState.player.discard.length}`, CONFIG.fieldPanel.x + 12, CONFIG.fieldPanel.y + 148);
      }

function drawLogOverlay() {
  if (!gameState.ui.showLogOverlay) return;

  ctx.save();

  ctx.fillStyle = CONFIG.colors.overlay;
  ctx.fillRect(0, 0, CONFIG.w, CONFIG.h);

  drawPanel(
    CONFIG.logOverlay.x,
    CONFIG.logOverlay.y,
    CONFIG.logOverlay.width,
    CONFIG.logOverlay.height
  );

  ctx.fillStyle = '#fff';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.font = 'bold 30px Arial';
  ctx.fillText(TEXT.panel.logTitle, CONFIG.logOverlay.x + 16, CONFIG.logOverlay.y + 38);

  const closeX = CONFIG.logOverlay.x + CONFIG.logOverlay.width - CONFIG.button.width - 16;
  const closeY = CONFIG.logOverlay.y + 10;
  drawButton(closeX, closeY, TEXT.button.closeLog, 'closeLog', true);

  // drawButton が中央寄せに変えるので、本文用に戻す
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.font = '16px Arial';

  const maxStart = Math.max(0, gameState.log.length - CONFIG.maxVisibleLog);
  const start = clamp(maxStart - gameState.logScroll, 0, maxStart);

  gameState.log.slice(start, start + CONFIG.maxVisibleLog).forEach((entry, index) => {
    ctx.fillStyle = '#dbe8ff';
    ctx.fillText(`• ${entry}`, CONFIG.logOverlay.x + 20, CONFIG.logOverlay.y + 86 + index * 28);
  });

  ctx.restore();
}

      function render() {
        ctx.fillStyle = CONFIG.colors.bg;
        ctx.fillRect(0, 0, CONFIG.w, CONFIG.h);

        gameState.uiRects = { playerCards: [], monsters: [], buttons: [] };

        drawEnemyHeader();
        drawBattleArea();
        drawMiddleBand();
        drawPlayerHandArea();
        drawContextPanel();
        drawBattleInfoPanel();
        drawEffectPreview();
        drawLogOverlay();
      }

      function getHitRect(rects, x, y) {
        return rects.find((rect) =>
          rect.enabled !== false &&
          x >= rect.x &&
          x <= rect.x + rect.w &&
          y >= rect.y &&
          y <= rect.y + rect.h
        ) || null;
      }

      function toCanvasPoint(event) {
        const rect = event.target.getBoundingClientRect();
        return {
          x: ((event.clientX - rect.left) / rect.width) * CONFIG.w,
          y: ((event.clientY - rect.top) / rect.height) * CONFIG.h,
        };
      }

      function onCanvasClick(event) {
        const point = toCanvasPoint(event);
        gameState.inputQueue.push({ type: 'click', x: point.x, y: point.y });
      }

      function onMouseMove(event) {
        const point = toCanvasPoint(event);
        const hit = getHitRect(gameState.uiRects.playerCards, point.x, point.y);
        gameState.hoveredCardId = hit ? hit.id : null;
      }

      function onWheel(event) {
        const point = toCanvasPoint(event);

        if (gameState.ui.showLogOverlay) {
          const inLog =
            point.x >= CONFIG.logOverlay.x &&
            point.x <= CONFIG.logOverlay.x + CONFIG.logOverlay.width &&
            point.y >= CONFIG.logOverlay.y &&
            point.y <= CONFIG.logOverlay.y + CONFIG.logOverlay.height;

          if (inLog) {
            gameState.logScroll = Math.max(0, gameState.logScroll + Math.sign(event.deltaY));
            event.preventDefault();
          }
          return;
        }

        const inContext =
          point.x >= CONFIG.contextPanel.x &&
          point.x <= CONFIG.contextPanel.x + CONFIG.contextPanel.width &&
          point.y >= CONFIG.contextPanel.y &&
          point.y <= CONFIG.contextPanel.y + CONFIG.contextPanel.height;

        if (inContext) {
          gameState.detailScroll = Math.max(0, gameState.detailScroll + Math.sign(event.deltaY));
          event.preventDefault();
        }
      }

      function initializeGame() {
        gameState.log = [];
        gameState.winner = null;
        gameState.ui.showLogOverlay = false;
        gameState.ui.enemyMessage = TEXT.state.enemyIdleMessage;
        hideEffectPreview();
        gameState.assets.refs = {};
        gameState.assets.warnedMissing = {};
        gameState.hoveredCardId = null;
        gameState.logScroll = 0;
        gameState.detailScroll = 0;
        gameState.field = {
          fire: CONFIG.energy.start,
          thunder: CONFIG.energy.start,
          earth: CONFIG.energy.start
        };

        gameState.player = {
          guts: CONFIG.guts.start,
          maxGuts: CONFIG.guts.max,
          monsters: [
            makeMonster('p1', 'Ember Cub', 'fire', 'beast', 'monsters.beast_bear'),
            makeMonster('p2', 'Bolt Pup', 'thunder', 'beast', 'monsters.thunder_wolf'),
            makeMonster('p3', 'Root Pal', 'earth', 'beast', 'monsters.earth_turtle'),
          ],
          hand: [],
          deck: createDeck('p'),
          discard: [],
        };

        gameState.enemy = {
          guts: CONFIG.guts.start,
          maxGuts: CONFIG.guts.max,
          monsters: [
            makeMonster('e1', 'Raider Ember', 'fire', 'beast', 'monsters.enemy_beast_bear'),
            makeMonster('e2', 'Raider Bolt', 'thunder', 'beast', 'monsters.enemy_thunder_wolf'),
            makeMonster('e3', 'Raider Root', 'earth', 'beast', 'monsters.enemy_earth_turtle'),
          ],
          hand: [],
          deck: createDeck('e'),
          discard: [],
        };

        gameState.phase = 'playing';
        clearSelection();
        startTurn('player');
        appendLog(TEXT.msg.battleStart);
      }

      function loop() {
        update();
        render();
        requestAnimationFrame(loop);
      }

      function boot() {
        canvas.addEventListener('click', onCanvasClick);
        canvas.addEventListener('mousemove', onMouseMove);
        canvas.addEventListener('wheel', onWheel, { passive: false });
        initializeGame();
        loop();
      }

      boot();
    })();
  </script>
</body>
</html>
