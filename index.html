      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function capitalize(text) {
        if (typeof text !== 'string') return '';
        if (text.length === 0) return '';
        return text.charAt(0).toUpperCase() + text.slice(1);
      }

      function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function getElementColor(element) {
        return CONFIG.colors[element] || '#fff';
      }

      function drawImageOrFallback(img, x, y, w, h, label) {
        if (img && img.complete && !img.failed) {
          ctx.drawImage(img, x, y, w, h);
          return;
        }
        ctx.fillStyle = '#314d7f';
        ctx.fillRect(x, y, w, h);
        ctx.strokeStyle = '#6c8cd0';
        ctx.strokeRect(x, y, w, h);
        ctx.fillStyle = '#d6e4ff';
        ctx.font = '12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(label || 'missing', x + w / 2, y + h / 2 + 4);
      }

      function formatText(template, values) {
        return Object.entries(values).reduce(
          (t, [k, v]) => t.replaceAll(`{${k}}`, `${v}`),
          template
        );
      }

      function appendLog(message) {
        gameState.log.push(message);
        if (gameState.log.length > CONFIG.maxLogEntries) {
          gameState.log.shift();
        }
      }

      function resolveAssetPath(key) {
        if (!key || typeof key !== 'string') return null;
        const [category, name] = key.split('.');
        if (!category || !name) return null;
        const group = ASSETS[category];
        if (!group || typeof group !== 'object') return null;
        return group[name] || null;
      }

      function createImageRef(key, src) {
        const img = new Image();
        const ref = {
          key,
          src,
          image: img,
          ok: false,
          failed: false
        };
        img.onload = () => {
          ref.ok = true;
          ref.failed = false;
        };
        img.onerror = () => {
          ref.ok = false;
          ref.failed = true;
        };
        img.src = src;
        return ref;
      }

      function getImageRef(key) {
        if (!key || typeof key !== 'string') return null;
        const cached = gameState.assets.refs[key];
        if (cached) return cached;

        const path = resolveAssetPath(key);
        if (!path) {
          const missingRef = {
            key,
            src: null,
            image: null,
            ok: false,
            failed: true
          };
          gameState.assets.refs[key] = missingRef;
          return missingRef;
        }

        const created = createImageRef(key, path);
        gameState.assets.refs[key] = created;
        return created;
      }

      function drawAssetOrFallback(key, x, y, w, h, label) {
        const ref = getImageRef(key);
        if (ref && ref.ok && ref.image) {
          ctx.drawImage(ref.image, x, y, w, h);
          return;
        }
        if (ref && ref.failed && !gameState.assets.warnedMissing[key]) {
          console.warn(`[asset-missing] ${key}`);
          gameState.assets.warnedMissing[key] = true;
        }

        ctx.fillStyle = '#314d7f';
        ctx.fillRect(x, y, w, h);
        ctx.strokeStyle = '#6c8cd0';
        ctx.strokeRect(x, y, w, h);
        ctx.fillStyle = '#d6e4ff';
        ctx.font = '12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(label || key || 'missing', x + w / 2, y + h / 2 + 4);
      }

      function setEnemyMessage(message) {
        gameState.ui.enemyMessage = message || TEXT.state.enemyIdleMessage;
      }

      function findCardById(cardId) {
        if (!cardId) return null;
        const pools = [
          gameState.player.hand,
          gameState.player.deck,
          gameState.player.discard,
          gameState.enemy.hand,
          gameState.enemy.deck,
          gameState.enemy.discard
        ];
        for (const pool of pools) {
          const found = pool.find((card) => card.id === cardId);
          if (found) return found;
        }
        return null;
      }

      function showEffectPreview(side, card, actorName, message) {
        if (!card) return;
        const preview = gameState.ui.effectPreview;
        preview.visible = true;
        preview.side = side;
        preview.cardId = card.id ?? null;
        preview.cardName = card.name ?? '';
        preview.actorName = actorName || '';
        preview.message = message || card.name || '';
        preview.startedAt = performance.now();
      }

      function hideEffectPreview() {
        const preview = gameState.ui.effectPreview;
        preview.visible = false;
        preview.side = 'player';
        preview.cardId = null;
        preview.cardName = '';
        preview.actorName = '';
        preview.message = '';
        preview.startedAt = 0;
      }

      function updateEffectPreview(now) {
        const preview = gameState.ui.effectPreview;
        if (!preview.visible) return;
        if (now >= preview.startedAt + preview.durationMs) {
          hideEffectPreview();
        }
      }

          id,
          name,
          element,
          type,
          asset,
          attackType: element,
          defenseType: element,
          hasActedThisTurn: false,
          hp: CONFIG.hp.base,
          maxHp: CONFIG.hp.base,
          alive: true

      }

      function normalizeEnergySet(value) {
        return {
          fire: value?.fire ?? 0,
          thunder: value?.thunder ?? 0,
          earth: value?.earth ?? 0,
        };
      }

        id,
        name,
        asset,
        category = 'atk',
        cardClass,
        timing = 'attack',
        element = null,
        scope = 'common',
        cost = 0,
        requirement = { fire: 0, thunder: 0, earth: 0 },
        enhance = null,
        consume = { fire: 0, thunder: 0, earth: 0 },
        description = '',
        effect = { kind: 'damage', amount: 0 },
        requiredAttackType = null

          id,
          name,
          asset,
          category,
          scope,
          cardClass,
          type: cardClass,
          timing,
          element,
          cost,
          requirement: normalizeEnergySet(requirement),

              condition: normalizeEnergySet(enhance.condition),

              bonusText: enhance.bonusText ?? ''

            : null,
          consume: normalizeEnergySet(consume),
          description,
          effect,
          requiredAttackType
        };
      }

      function shuffle(items) {
        const clone = [...items];
        for (let i = clone.length - 1; i > 0; i -= 1) {
          const j = getRandomInt(0, i);
          [clone[i], clone[j]] = [clone[j], clone[i]];
        }
        return clone;

          makeCard({ id: 'sup_fire_common_shard', asset: 'cards.sup_fire_common_shard', name: 'Fire Shard', category: 'sup', cardClass: 'SHARD', element: 'fire', scope: 'common', cost: 0, requirement: { fire: 0, thunder: 0, earth: 0 }, description: 'Gain +1 Guts and +1 Fire Energy.', effect: { kind: 'shard', energy: 'fire' } }),
          makeCard({ id: 'sup_thunder_common_shard', asset: 'cards.sup_thunder_common_shard', name: 'Thunder Shard', category: 'sup', cardClass: 'SHARD', element: 'thunder', scope: 'common', cost: 0, requirement: { fire: 0, thunder: 0, earth: 0 }, description: 'Gain +1 Guts and +1 Thunder Energy.', effect: { kind: 'shard', energy: 'thunder' } }),
          makeCard({ id: 'sup_earth_common_shard', asset: 'cards.sup_earth_common_shard', name: 'Earth Shard', category: 'sup', cardClass: 'SHARD', element: 'earth', scope: 'common', cost: 0, requirement: { fire: 0, thunder: 0, earth: 0 }, description: 'Gain +1 Guts and +1 Earth Energy.', effect: { kind: 'shard', energy: 'earth' } }),
          makeCard({ id: 'def_beast_guard', asset: 'cards.def_beast_guard', name: 'Guard Burst', category: 'def', cardClass: 'DEF', element: null, scope: 'common', cost: 2, requirement: { fire: 0, thunder: 0, earth: 0 }, description: 'Reaction: Block incoming damage. Lose all Guts.', effect: { kind: 'defense', blockAmount: 99, gutsMode: 'zero' } }),
          makeCard({ id: 'def_beast_quickBarrier', asset: 'cards.def_beast_guard', name: 'Quick Barrier', category: 'def', cardClass: 'DEF', element: null, scope: 'common', cost: 1, requirement: { fire: 0, thunder: 0, earth: 0 }, description: 'Reaction: Block 3 damage. Lose 1 Guts.', effect: { kind: 'defense', blockAmount: 3, gutsLoss: 1 } }),
          makeCard({ id: 'atk_neutral_common_raiKa', asset: 'cards.atk_neutral_common_raiKa', name: '雷火', category: 'atk', cardClass: 'COMMON', element: null, scope: 'common', cost: 2, requirement: { fire: 0, thunder: 0, earth: 0 }, enhance: { condition: { fire: 4, thunder: 4, earth: 0 }, bonusDamage: 5, bonusText: 'F4/T4で+5ダメージ' }, consume: { fire: 0, thunder: 0, earth: 0 }, description: 'Deal 4 damage. Enhanced with shared field.', effect: { kind: 'damage', amount: 4 } }),
          makeCard({ id: 'atk_fire_beast_megaFlame', asset: 'cards.atk_fire_beast_megaFlame', name: 'Mega Flame', category: 'atk', cardClass: 'TYPE', element: 'fire', scope: 'beast', cost: 3, requirement: { fire: 5, thunder: 0, earth: 0 }, consume: { fire: 3, thunder: 0, earth: 0 }, description: 'Deal 8 damage. Consume Fire 3.', effect: { kind: 'damage', amount: 8 }, requiredAttackType: 'fire' }),
          makeCard({ id: 'atk_thunder_beast_stormNova', asset: 'cards.atk_thunder_beast_stormNova', name: 'Storm Nova', category: 'atk', cardClass: 'TYPE', element: 'thunder', scope: 'beast', cost: 3, requirement: { fire: 0, thunder: 3, earth: 0 }, enhance: { condition: { fire: 2, thunder: 5, earth: 0 }, bonusDamage: 3, bonusText: 'T5/F2で+3ダメージ' }, consume: { fire: 0, thunder: 2, earth: 0 }, description: 'Deal 5 damage. Enhance and consume Thunder 2.', effect: { kind: 'damage', amount: 5 }, requiredAttackType: 'thunder' }),
        ];
        return shuffle(set);
      }

      function getSideData(side) {
        return side === 'player' ? gameState.player : gameState.enemy;
      }

      function getOpponentSide(side) {
        return side === 'player' ? 'enemy' : 'player';
      }

      function getLivingMonsters(sideData) {
        return sideData.monsters.filter((monster) => monster.alive);
      }

      function getCardFromHand(sideData, cardId) {
        return sideData.hand.find((card) => card.id === cardId) || null;
      }

      function getMonster(sideData, monsterId) {
        return sideData.monsters.find((monster) => monster.id === monsterId) || null;
      }

      function isAttackTypeMatch(card, actor) {
        if (!card || !actor) return true;
        if (card.type !== 'TYPE') return true;
        if (card.scope === 'common') return true;
        if (card.scope && actor.type && card.scope !== actor.type) return false;
        return card.requiredAttackType === actor.attackType;
      }

      function getFieldEnergy() {
        return {
          fire: gameState.field.fire,
          thunder: gameState.field.thunder,
          earth: gameState.field.earth
        };
      }

      function getEnergyShortageReason(requirement) {
        const energy = getFieldEnergy();
        if (energy.fire < (requirement.fire ?? 0)) return TEXT.reason.needFireShared;
        if (energy.thunder < (requirement.thunder ?? 0)) return TEXT.reason.needThunderShared;
        if (energy.earth < (requirement.earth ?? 0)) return TEXT.reason.needEarthShared;
        return '';
      }

      function meetsEnergyRequirement(requirement = { fire: 0, thunder: 0, earth: 0 }) {
        return !getEnergyShortageReason(requirement);
      }

      function canConsumeFieldEnergy(consume = { fire: 0, thunder: 0, earth: 0 }) {
        const energy = getFieldEnergy();
        return (
          energy.fire >= (consume.fire ?? 0) &&
          energy.thunder >= (consume.thunder ?? 0) &&
          energy.earth >= (consume.earth ?? 0)
        );
      }

      function isDefenseCard(card) {
        return card?.effect?.kind === 'defense';
      }

      function isDefenseReactionOpenFor(side) {
        return !!gameState.ui.defenseReaction?.active && gameState.ui.defenseReaction.defenderSide === side;
      }

      function chooseShardEnergyElement(card) {
        const hinted = card?.effect?.energy;
        if (ELEMENTS.includes(hinted)) return hinted;
        const energy = getFieldEnergy();
        let best = ELEMENTS[0];
        ELEMENTS.forEach((element) => {
          if ((energy[element] ?? 0) < (energy[best] ?? 0)) {
            best = element;
          }
        });
        return best;
      }

      function isCardEnhanced(card) {
        if (!card || !card.enhance) return false;
        return meetsEnergyRequirement(card.enhance.condition);
      }

      function getCardFinalDamage(card) {
        const base = card?.effect?.amount ?? 0;
        if (!card || card.effect?.kind !== 'damage') return base;
        const raw = isCardEnhanced(card)
          ? base + (card.enhance?.bonusDamage ?? 0)
          : base;
        return Math.max(1, raw | 0);
      }

      function consumeFieldEnergy(consume = { fire: 0, thunder: 0, earth: 0 }) {
        ELEMENTS.forEach((element) => {
          gameState.field[element] = clamp(
            gameState.field[element] - (consume[element] ?? 0),
            0,
            CONFIG.energy.max
          );
        });
      }

      function getCardUsability(side, card, actor = null) {
        const sideData = getSideData(side);
        if (!card) return { playable: false, reason: TEXT.reason.noCard };
        if (isDefenseCard(card) && !isDefenseReactionOpenFor(side)) {
          return { playable: false, reason: TEXT.reason.defenseReactionOnly };
        }
        if (card.type === 'SHARD') return { playable: true, reason: TEXT.reason.shardAlways };

        if (sideData.guts < card.cost) {
          return {
            playable: false,
            reason: formatText(TEXT.reason.needGuts, {
              have: sideData.guts,
              need: card.cost
            })
          };
        }

        const requirementReason = getEnergyShortageReason(card.requirement);
        if (requirementReason) {
          return { playable: false, reason: requirementReason };
        }

        if (!canConsumeFieldEnergy(card.consume)) {
          return {
            playable: false,
            reason: TEXT.reason.needConsumeEnergy
          };
        }

        if (card.type === 'TYPE' && actor && !isAttackTypeMatch(card, actor)) {
          return { playable: false, reason: TEXT.reason.typeMismatch };
        }

        return { playable: true, reason: '' };
      }

      function getCardPreviewEnergyText(triplet) {
        const safe = triplet || { fire: 0, thunder: 0, earth: 0 };
        return `F${safe.fire ?? 0} / T${safe.thunder ?? 0} / E${safe.earth ?? 0}`;
      }

      function formatIdList(ids) {
        if (!Array.isArray(ids) || ids.length === 0) return TEXT.state.none;
        return ids.join(', ');
      }

      function formatEnergyTriplet(triplet = { fire: 0, thunder: 0, earth: 0 }) {
        return `F${triplet.fire ?? 0} / T${triplet.thunder ?? 0} / E${triplet.earth ?? 0}`;
      }

      function getOptionalConsumeSummary(card) {
        const consume = card?.consume || { fire: 0, thunder: 0, earth: 0 };
        const parts = ELEMENTS
          .filter((element) => (consume[element] ?? 0) > 0)
          .map((element) => `${capitalize(element).slice(0, 1)}${consume[element]}`);
        return parts.length > 0 ? parts.join(' ') : TEXT.cardFace.noOptional;
      }

      function getEnhanceSummary(card) {
        const enhance = card?.enhance || null;
        if (!enhance) return TEXT.cardFace.noOptional;
        const condText = formatEnergyTriplet(enhance.condition || { fire: 0, thunder: 0, earth: 0 });
        return `${condText} -> +${enhance.bonusDamage ?? 0}`;
      }

      function buildCardPreviewState(state, side, card, actorId = null) {
        const empty = {
          visible: false,
          cardId: null,
          actorId: null,
          playable: false,
          reason: TEXT.state.none,
          costText: '',
          requirementText: '',
          actorHint: '',
          targetHint: '',
          effectText: '',
          enhanceText: '',
          validActorIds: [],
          validTargetIds: [],
          damagePreview: 0,
          consumeSummary: '',
          enhanceSummary: '',
          resultSummary: '',
          enhancedActive: false,
          mainValue: '',
          specialIcons: [],
          hasEnhance: false,
        };

        if (!state || !card || !side) return empty;
        const sideData = side === 'enemy' ? state.enemy : state.player;
        if (!sideData) return empty;
        const cardInHand = getCardFromHand(sideData, card.id);
        if (!cardInHand) return empty;

        const selectedActor = getMonster(sideData, actorId);
        const usability = getCardUsability(side, cardInHand, selectedActor || null);
        const validActorIds = getValidActorIds(side).filter((id) => (
          getActorSelectionValidation(side, id, cardInHand).valid
        ));
        const validTargetIds = getValidTargetIds(side, cardInHand);
        const actorValidation = actorId
          ? getActorSelectionValidation(side, actorId, cardInHand)
          : { valid: false, reason: TEXT.reason.needActor };
        const enhanced = isCardEnhanced(cardInHand);
        const damagePreview = cardInHand.effect?.kind === 'damage' ? getCardFinalDamage(cardInHand) : 0;
        const consumeSummary = getOptionalConsumeSummary(cardInHand);
        const enhanceSummary = getEnhanceSummary(cardInHand);
        const resultSummary = cardInHand.effect?.kind === 'damage'
          ? `Damage ${damagePreview}`
          : (cardInHand.effect?.kind === 'shard'
            ? `Gain +${CONFIG.energy.shardGain} Guts / +${CONFIG.energy.shardGain} Energy`
            : `Block ${cardInHand.effect?.blockAmount ?? 0}`);
        const mainValue = cardInHand.effect?.kind === 'damage'
          ? `${damagePreview}`
          : (cardInHand.effect?.kind === 'shard'
            ? `+${CONFIG.energy.shardGain}`
            : `${cardInHand.effect?.blockAmount ?? 0}`);
        const specialIcons = [];
        if ((cardInHand.consume?.fire ?? 0) + (cardInHand.consume?.thunder ?? 0) + (cardInHand.consume?.earth ?? 0) > 0) {
          specialIcons.push(TEXT.cardFace.effectConsume);
        }
        if (cardInHand.type === 'TYPE' || cardInHand.requiredAttackType) {
          specialIcons.push(TEXT.cardFace.effectType);
        }

        let effectText = formatText(TEXT.preview.effectOther, { kind: cardInHand.effect?.kind ?? 'none' });
        if (cardInHand.effect?.kind === 'damage') {
          effectText = TEXT.preview.effectDamage;
        } else if (cardInHand.effect?.kind === 'shard') {
          const previewEnergy = ELEMENTS.includes(cardInHand.effect?.energy)
            ? capitalize(cardInHand.effect.energy)
            : 'Auto';
          effectText = formatText(TEXT.preview.effectShard, {
            gain: CONFIG.energy.shardGain,
            energy: previewEnergy,
          });
        } else if (cardInHand.effect?.kind === 'defense') {
          effectText = `Defense block: ${cardInHand.effect?.blockAmount ?? 0}`;
        }

        const actorHint = actorId
          ? (actorValidation.valid
            ? TEXT.preview.actorHintValid
            : formatText(TEXT.preview.actorHintInvalid, { reason: actorValidation.reason }))
          : TEXT.preview.actorHintNeedSelection;
        const targetHint = validTargetIds.length > 0
          ? formatText(TEXT.preview.targetSummary, {
            count: validTargetIds.length,
            list: formatIdList(validTargetIds),
          })
          : TEXT.preview.targetHintNoTarget;

        return {
          visible: true,
          cardId: cardInHand.id,
          actorId: actorId || null,
          playable: usability.playable,
          reason: usability.reason || TEXT.state.none,
          costText: `Cost ${cardInHand.cost}`,
          requirementText: `Requirement: ${getCardPreviewEnergyText(cardInHand.requirement)}`,
          actorHint,
          targetHint,
          effectText,
          enhanceText: formatText(
            enhanced ? TEXT.preview.enhanceActive : TEXT.preview.enhanceInactive,
            { bonus: cardInHand.enhance?.bonusDamage ?? 0 }
          ),
          validActorIds,
          validTargetIds,
          damagePreview,
          consumeSummary,
          enhanceSummary,
          resultSummary,
          enhancedActive: enhanced,
          mainValue,
          specialIcons,
          hasEnhance: !!cardInHand.enhance,
        };
      }

      function canMonsterAct(monster) {
        return monster.alive && !monster.hasActedThisTurn;
      }

      function getValidActorIds(side) {
        return getSideData(side).monsters
          .filter((monster) => canMonsterAct(monster))
          .map((monster) => monster.id);
      }

      function getActorSelectionValidation(side, monsterId, card) {
        const monster = getMonster(getSideData(side), monsterId);
        if (!monster || !monster.alive) {
          return { valid: false, reason: TEXT.reason.needActor };
        }
        if (monster.hasActedThisTurn) {
          return { valid: false, reason: TEXT.reason.actedActor };
        }
        if (card && card.type === 'TYPE' && !isAttackTypeMatch(card, monster)) {
          return { valid: false, reason: TEXT.reason.typeMismatch };
        }
        return { valid: true, reason: '' };
      }

      function markMonsterActed(side, monsterId) {
        const monster = getMonster(getSideData(side), monsterId);
        if (!monster) return;
        monster.hasActedThisTurn = true;
      }

      function resetMonstersActionState(side) {
        getSideData(side).monsters.forEach((monster) => {
          monster.hasActedThisTurn = false;
        });
      }

      function getValidTargetIds(side, card) {
        if (!card) return [];
        if (card.effect.kind === 'damage') {
          return getLivingMonsters(getSideData(getOpponentSide(side))).map((monster) => monster.id);
        }
        return getLivingMonsters(getSideData(side)).map((monster) => monster.id);
      }

      function spendCardCost(side, card) {
        const sideData = getSideData(side);
        sideData.guts = clamp(sideData.guts - card.cost, 0, sideData.maxGuts);
      }

      function drawUntilHandLimit(side) {
        const sideData = getSideData(side);
        while (sideData.hand.length < CONFIG.handSize && sideData.deck.length > 0) {
          sideData.hand.push(sideData.deck.shift());
        }
      }

      function recoverDrawPhaseGuts(side) {
        const sideData = getSideData(side);
        const aliveCount = getLivingMonsters(sideData).length;
        const gain = CONFIG.drawGutsRecover[aliveCount] ?? 0;
        sideData.guts = clamp(sideData.guts + gain, 0, sideData.maxGuts);
        appendLog(formatText(TEXT.msg.drawRecover, { side: capitalize(side), gain }));
      }

      function moveCardToDiscard(side, cardId) {
        const sideData = getSideData(side);
        const index = sideData.hand.findIndex((card) => card.id === cardId);
        if (index < 0) return null;
        const [card] = sideData.hand.splice(index, 1);
        sideData.discard.push(card);
        return card;
      }

      function gainResourcesFromConversion(side, card) {
        if (!card) return;
        const sideData = getSideData(side);
        sideData.guts = clamp(sideData.guts + CONFIG.guts.convertGain, 0, sideData.maxGuts);
        if (ELEMENTS.includes(card.element)) {
          gameState.field[card.element] = clamp(
            gameState.field[card.element] + CONFIG.energy.convertGain,
            0,
            CONFIG.energy.max
          );
          appendLog(formatText(TEXT.msg.convertEnergy, {
            gain: CONFIG.energy.convertGain,
            element: capitalize(card.element),
          }));
          return;
        }

        appendLog(formatText(TEXT.msg.convertGutsOnly, {
          card: card.name || card.id || 'Card',
          gain: CONFIG.guts.convertGain,
        }));
      }

      function dealDamage(targetSide, targetId, amount) {
        const target = getMonster(getSideData(targetSide), targetId);
        if (!target || !target.alive) return false;

        target.hp = clamp(target.hp - amount, 0, target.maxHp);
        if (target.hp === 0) {
          target.alive = false;
          appendLog(formatText(TEXT.msg.defeated, { name: target.name }));
        }
        return true;
      }

      function clearDefenseReactionState() {
        gameState.ui.defenseReaction = {
          active: false,
          attackerSide: null,
          defenderSide: null,
          actorId: null,
          targetId: null,
          cardId: null,
          damage: 0,
          enhanced: false,
          expiresAt: 0,
          remainingMs: 0,
          defendedByCardId: null,
          reducedDamage: 0,
        };
      }

      function getUsableDefenseCards(side) {
        const sideData = getSideData(side);
        return (sideData?.hand || []).filter((card) => isDefenseCard(card) && getCardUsability(side, card).playable);
      }

      function getDefenseCardsInHand(side) {
        const sideData = getSideData(side);
        return (sideData?.hand || []).filter((card) => isDefenseCard(card));
      }

      function applyDefenseCard(side, defenseCard) {
        const reaction = gameState.ui.defenseReaction;
        if (!reaction.active || reaction.defenderSide !== side || !defenseCard) return;
        const sideData = getSideData(side);
        if (defenseCard.effect?.gutsMode === 'zero') {
          sideData.guts = 0;
        } else if ((defenseCard.effect?.gutsLoss ?? 0) > 0) {
          sideData.guts = clamp(
            sideData.guts - (defenseCard.effect.gutsLoss ?? 0),
            0,
            sideData.maxGuts
          );
        }
        const blockAmount = Math.max(0, defenseCard.effect?.blockAmount ?? reaction.damage);
        const nextDamage = clamp(reaction.damage - blockAmount, 0, reaction.damage);
        reaction.defendedByCardId = defenseCard.id;
        reaction.reducedDamage = reaction.damage - nextDamage;
        reaction.damage = nextDamage;
        moveCardToDiscard(side, defenseCard.id);
        appendLog(formatText(TEXT.msg.defenseUsed, {
          side: capitalize(side),
          card: defenseCard.name || defenseCard.id,
          amount: reaction.reducedDamage,
        }));
        setBattleFeedback(`BLOCK ${reaction.reducedDamage}`, CONFIG.battleFeedback.durationMs);
        gameState.ui.defenseResolveDelay = {
          active: true,
          until: performance.now() + CONFIG.defenseReaction.resolveDelayMs,
        };
      }

      function resolvePendingAttack() {
        const reaction = gameState.ui.defenseReaction;
        if (!reaction.active) return false;
        const attackCard = findCardById(reaction.cardId);
        const ok = dealDamage(reaction.defenderSide, reaction.targetId, reaction.damage);
        if (!ok) {
          clearDefenseReactionState();
          return false;
        }

        appendLog(formatText(TEXT.msg.cardUsedDamage, {
          side: capitalize(reaction.attackerSide),
          card: attackCard?.name || reaction.cardId,
          actor: reaction.actorId,
          target: reaction.targetId,
          amount: reaction.damage,
        }));
        if (reaction.enhanced) {
          appendLog(formatText(TEXT.msg.cardEnhanced, { card: attackCard?.name || reaction.cardId }));
          appendLog(formatText(TEXT.msg.cardEnhancedBonus, {
            card: attackCard?.name || reaction.cardId,
            bonus: attackCard?.enhance?.bonusDamage ?? 0
          }));
        }
        clearDefenseReactionState();
        return true;
      }

      function maybeOpenDefenseReaction(attackerSide, attackCard, actorId, targetId, finalDamage, enhanced) {
        const defenderSide = getOpponentSide(attackerSide);
        const defenseCardsInHand = getDefenseCardsInHand(defenderSide);
        if (finalDamage <= 0) return false;
        if (defenseCardsInHand.length === 0) return false;

        if (defenderSide === 'enemy') {
          const defenseCards = getUsableDefenseCards(defenderSide);
          if (defenseCards.length === 0) return false;
          const targetMonster = getMonster(getSideData(defenderSide), targetId);
          const targetHp = targetMonster?.hp ?? 0;
          const hpPercent = targetMonster?.maxHp > 0
            ? Math.floor((targetHp * 100) / targetMonster.maxHp)
            : 0;
          const lethal = targetHp > 0 && finalDamage >= targetHp;
          const useDefense =
            getSideData(defenderSide).guts > 0 &&
            (lethal ||
              finalDamage >= CONFIG.defenseReaction.enemyUseMinDamage ||
              hpPercent <= CONFIG.defenseReaction.enemyLowHpPercent);
          if (!useDefense) return false;
          gameState.ui.defenseReaction = {
            active: true,
            attackerSide,
            defenderSide,
            actorId,
            targetId,
            cardId: attackCard.id,
            damage: finalDamage,
            enhanced: !!enhanced,
            expiresAt: 0,
            remainingMs: 0,
            defendedByCardId: null,
            reducedDamage: 0,
          };
          applyDefenseCard(defenderSide, defenseCards[0]);
          return true;
        }

        gameState.ui.defenseReaction = {
          active: true,
          attackerSide,
          defenderSide,
          actorId,
          targetId,
          cardId: attackCard.id,
          damage: finalDamage,
          enhanced: !!enhanced,
          expiresAt: performance.now() + CONFIG.defenseReaction.windowMs,
          remainingMs: CONFIG.defenseReaction.windowMs,
          defendedByCardId: null,
          reducedDamage: 0,
        };
        setBattleFeedback(TEXT.preview.defenseWindow, CONFIG.defenseReaction.windowMs);
        return true;
      }

      function applyCard(side, card, actorId, targetId) {
        const actor = getMonster(getSideData(side), actorId);
        const actorName = actor?.name || actorId || '';
        const previewMessage = actorName
          ? formatText(TEXT.preview.usedBy, { actor: actorName, card: card?.name || '' })
          : formatText(
            side === 'enemy' ? TEXT.preview.enemyUsed : TEXT.preview.playerUsed,
            { card: card?.name || '' }
          );
        showEffectPreview(side, card, actorName, previewMessage);

        spendCardCost(side, card);

        if (card.effect.kind === 'damage') {
          const enhanced = isCardEnhanced(card);
          const finalDamage = getCardFinalDamage(card);
          const opened = maybeOpenDefenseReaction(side, card, actorId, targetId, finalDamage, enhanced);
          if (!opened) {
            const ok = dealDamage(getOpponentSide(side), targetId, finalDamage);
            if (!ok) return false;
            appendLog(formatText(TEXT.msg.cardUsedDamage, {
              side: capitalize(side),
              card: card.name,
              actor: actorId,
              target: targetId,
              amount: finalDamage,
            }));
            if (enhanced) {
              appendLog(formatText(TEXT.msg.cardEnhanced, { card: card.name }));
              appendLog(formatText(TEXT.msg.cardEnhancedBonus, {
                card: card.name,
                bonus: card.enhance?.bonusDamage ?? 0
              }));
            }
          }
        }

        if (card.effect.kind === 'shard') {
          const sideData = getSideData(side);
          const shardElement = chooseShardEnergyElement(card);
          sideData.guts = clamp(
            sideData.guts + CONFIG.energy.shardGain,
            0,
            sideData.maxGuts
          );
          gameState.field[shardElement] = clamp(
            gameState.field[shardElement] + CONFIG.energy.shardGain,
            0,
            CONFIG.energy.max
          );

          appendLog(formatText(TEXT.msg.cardUsedShard, {
            side: capitalize(side),
            card: card.name,
            actor: actorId,
            target: targetId,
            energy: capitalize(shardElement),
          }));
        }

        if (canConsumeFieldEnergy(card.consume)) {
          consumeFieldEnergy(card.consume);
          const consumeParts = ELEMENTS
            .filter((element) => (card.consume?.[element] ?? 0) > 0)
            .map((element) => `${capitalize(element)} ${card.consume[element]}`);
          if (consumeParts.length > 0) {
            appendLog(formatText(TEXT.msg.cardConsume, {
              card: card.name,
              detail: consumeParts.join(', ')
            }));
          }
        }

        return true;
      }

      function clearSelection() {
        gameState.selectedCardId = null;
        gameState.selectedActorId = null;
        gameState.selectedTargetId = null;
        gameState.selectionStep = 'none';
        gameState.ui.invalidReason = TEXT.state.none;
      }

      function cancelSelection(reasonText) {
        clearSelection();
        if (reasonText) appendLog(reasonText);
      }

      function setTurnFlash(text, duration) {
        gameState.ui.turnFlash.text = text || '';
        gameState.ui.turnFlash.timer = performance.now() + duration;
        gameState.ui.turnFlash.duration = duration;
      }

      function setBattleFeedback(text, duration) {
        gameState.ui.battleFeedback.text = text || '';
        gameState.ui.battleFeedback.timer = performance.now() + duration;
        gameState.ui.battleFeedback.duration = duration;
      }

      function startTurn(side) {
        gameState.turnSide = side;
        gameState.turnPhase = 'draw';
        gameState.enemyActionsDone = 0;
        resetMonstersActionState(side);
        clearSelection();
        gameState.temp.gutsSelectedCardIds = [];
        if (side === 'enemy') setEnemyMessage('カードを引くぜ！');
        else setEnemyMessage(TEXT.state.enemyIdleMessage);
        setTurnFlash(side === 'enemy' ? TEXT.turnFlash.enemyTurn : TEXT.turnFlash.playerTurn, CONFIG.turnFlash.durationMs);
        setBattleFeedback(formatText(TEXT.feedback.turnChange, { side: capitalize(side) }), CONFIG.battleFeedback.durationMs);
        runDrawPhase(side);
      }

      function runDrawPhase(side) {
        drawUntilHandLimit(side);
        recoverDrawPhaseGuts(side);
        gameState.turnPhase = 'attack';
        appendLog(formatText(TEXT.msg.attackStart, { side: capitalize(side) }));
        setTurnFlash(TEXT.turnFlash.attackPhase, CONFIG.turnFlash.durationMs);
        setBattleFeedback(TEXT.feedback.phaseAttack, CONFIG.battleFeedback.durationMs);
        if (side === 'enemy') {
          setEnemyMessage('攻撃するぜ！');
          gameState.enemyActionTimer = performance.now() + 450;
        }
      }

      function finishTurn() {
        const nextSide = getOpponentSide(gameState.turnSide);
        startTurn(nextSide);
      }

      function runEnemyGutsPhase() {
        setEnemyMessage('宵越しのカードは残さないよ！');
        const enemyCardIds = gameState.enemy.hand.map((card) => card.id);
        applyGutsConversion('enemy', enemyCardIds);
        finishTurn();
      }

      function checkWinCondition() {
        if (gameState.phase === 'gameover') return;

        const playerAlive = getLivingMonsters(gameState.player).length;
        const enemyAlive = getLivingMonsters(gameState.enemy).length;

        if (playerAlive === 0 || enemyAlive === 0) {
          gameState.phase = 'gameover';
          gameState.winner = enemyAlive === 0 ? 'player' : 'enemy';
          appendLog(formatText(TEXT.msg.win, { side: capitalize(gameState.winner) }));
          clearSelection();
        }
      }

      function beginPlayerCardSelection(cardId) {
        if (gameState.turnPhase !== 'attack') {
          gameState.ui.invalidReason = TEXT.reason.waitAttackPhase;
          appendLog(formatText(TEXT.msg.invalidCard, { reason: TEXT.reason.waitAttackPhase }));
          setBattleFeedback(TEXT.feedback.invalidCard, CONFIG.battleFeedback.durationMs);
          return;
        }

        if (gameState.selectedCardId === cardId) {
          cancelSelection(TEXT.msg.cancelSelection);
          return;
        }

        const card = getCardFromHand(gameState.player, cardId);
        const usability = getCardUsability('player', card);

        if (!usability.playable) {
          gameState.ui.invalidReason = usability.reason;
          appendLog(formatText(TEXT.msg.invalidCard, { reason: usability.reason }));
          setBattleFeedback(TEXT.feedback.invalidCard, CONFIG.battleFeedback.durationMs);
          clearSelection();
          return;
        }

        gameState.selectedCardId = cardId;
        gameState.selectionStep = 'selectActor';
        gameState.selectedActorId = null;
        gameState.selectedTargetId = null;
        gameState.ui.invalidReason = TEXT.state.none;
        appendLog(formatText(TEXT.msg.selectCard, { card: card.name }));
      }

      function trySelectActor(monsterId) {
        if (gameState.selectionStep !== 'selectActor') return;

        const card = getCardFromHand(gameState.player, gameState.selectedCardId);
        const validation = getActorSelectionValidation('player', monsterId, card);
        if (!validation.valid) {
          gameState.ui.invalidReason = validation.reason;
          setBattleFeedback(TEXT.feedback.invalidActor, CONFIG.battleFeedback.durationMs);
          return;
        }

        gameState.selectedActorId = monsterId;
        gameState.selectionStep = 'selectTarget';
        appendLog(TEXT.msg.selectActor);
      }

      function trySelectTargetAndResolve(monsterId) {
        if (gameState.selectionStep !== 'selectTarget') return;

        const card = getCardFromHand(gameState.player, gameState.selectedCardId);
        if (!card) {
          clearSelection();
          return;
        }

        if (!getValidTargetIds('player', card).includes(monsterId)) {
          gameState.ui.invalidReason = TEXT.reason.needTarget;
          appendLog(TEXT.msg.invalidTarget);
          setBattleFeedback(TEXT.feedback.invalidTarget, CONFIG.battleFeedback.durationMs);
          return;
        }

        gameState.selectedTargetId = monsterId;
        const applied = applyCard('player', card, gameState.selectedActorId, gameState.selectedTargetId);

        if (applied) {
          if (card.effect.kind === 'damage') {
            markMonsterActed('player', gameState.selectedActorId);
            setBattleFeedback(TEXT.feedback.cardUsed, CONFIG.battleFeedback.durationMs);
          }
          if (card.effect.kind === 'shard') {
            setBattleFeedback(TEXT.feedback.shardUsed, CONFIG.battleFeedback.durationMs);
          }
          moveCardToDiscard('player', card.id);
        }

        clearSelection();
        checkWinCondition();
      }

      function endPlayerAttackPhase() {
        gameState.turnPhase = 'guts';
        gameState.temp.gutsSelectedCardIds = [];
        setTurnFlash(TEXT.turnFlash.gutsPhase, CONFIG.turnFlash.durationMs);
        setBattleFeedback(TEXT.feedback.phaseGuts, CONFIG.battleFeedback.durationMs);
        clearSelection();
      }

      function togglePlayerGutsCard(cardId) {
        if (gameState.turnSide !== 'player' || gameState.turnPhase !== 'guts') return;

        const ids = gameState.temp.gutsSelectedCardIds;
        const index = ids.indexOf(cardId);
        if (index >= 0) ids.splice(index, 1);
        else ids.push(cardId);
      }

      function applyGutsConversion(side, cardIds) {
        let converted = 0;
        cardIds.forEach((cardId) => {
          const moved = moveCardToDiscard(side, cardId);
          if (moved) {
            converted += 1;
            gainResourcesFromConversion(side, moved);
          }
        });
        appendLog(formatText(
          side === 'player' ? TEXT.msg.playerConvert : TEXT.msg.enemyConvert,
          { n: converted }
        ));
        if (converted > 0) {
          setBattleFeedback(TEXT.feedback.shardUsed, CONFIG.battleFeedback.durationMs);
        }
      }

      function convertSelectedPlayerCards() {
        if (gameState.turnSide !== 'player' || gameState.turnPhase !== 'guts') return;
        const selectedIds = [...gameState.temp.gutsSelectedCardIds];
        applyGutsConversion('player', selectedIds);
        gameState.temp.gutsSelectedCardIds = [];
      }

      function finishPlayerGutsPhase() {
        if (gameState.turnSide !== 'player' || gameState.turnPhase !== 'guts') return;
        convertSelectedPlayerCards();
        finishTurn();
      }

      function runEnemyAttackStep() {
        if (gameState.turnSide !== 'enemy' || gameState.turnPhase !== 'attack') return;
        if (gameState.enemy.monsters.filter((m) => m.alive).length <= 1) {
          setEnemyMessage('ピンチだぜぃ！');
        } else {
          setEnemyMessage('攻撃するぜ！');
        }

        const playable = gameState.enemy.hand.filter((card) => getCardUsability('enemy', card).playable);

        if (playable.length === 0 || gameState.enemyActionsDone >= CONFIG.MAX_ACTIONS_PER_TURN) {
          gameState.turnPhase = 'guts';
          runEnemyGutsPhase();
          return;
        }

        const card = playable[0];
        const actorIds = getValidActorIds('enemy').filter((actorId) => {
          const actor = getMonster(gameState.enemy, actorId);
          return actor && isAttackTypeMatch(card, actor);
        });
        const targetIds = getValidTargetIds('enemy', card);

        if (actorIds.length === 0 || targetIds.length === 0) {
          gameState.turnPhase = 'guts';
          runEnemyGutsPhase();
          return;
        }

        const actorId = actorIds[0];
        const targetId = targetIds[0];

        const applied = applyCard('enemy', card, actorId, targetId);
        if (applied) {
          if (card.effect.kind === 'damage') {
            markMonsterActed('enemy', actorId);
            setBattleFeedback(TEXT.feedback.cardUsed, CONFIG.battleFeedback.durationMs);
          }
          if (card.effect.kind === 'shard') {
            setBattleFeedback(TEXT.feedback.shardUsed, CONFIG.battleFeedback.durationMs);
          }
          moveCardToDiscard('enemy', card.id);
          gameState.enemyActionsDone += 1;
        }
        checkWinCondition();
      }

      function onActionButton(action) {
        if (action === 'toggleLog') {
          gameState.ui.showLogOverlay = !gameState.ui.showLogOverlay;
          return;
        }

        if (action === 'closeLog') {
          gameState.ui.showLogOverlay = false;
          return;
        }

        if (gameState.turnSide !== 'player') return;

        if (action === 'cancel') {
          cancelSelection(TEXT.msg.cancelSelection);
          gameState.temp.gutsSelectedCardIds = [];
          return;
        }

        if (action === 'endAttack' && gameState.turnPhase === 'attack') {
          endPlayerAttackPhase();
          return;
        }

        if (action === 'endTurn' && gameState.turnPhase === 'guts') {
          finishPlayerGutsPhase();
        }
      }

      function handleCanvasClick(x, y) {
        const buttonHit = getHitRect(gameState.uiRects.buttons, x, y);
        if (buttonHit) {
          onActionButton(buttonHit.action);
          return;
        }

        if (gameState.ui.showLogOverlay) return;

        if (gameState.ui.defenseReaction.active) {
          if (gameState.ui.defenseReaction.defenderSide !== 'player') return;
          const defenseCardHit = getHitRect(gameState.uiRects.playerCards, x, y);
          if (!defenseCardHit) return;
          const defenseCard = getCardFromHand(gameState.player, defenseCardHit.id);
          const usability = getCardUsability('player', defenseCard);
          if (!defenseCard || !isDefenseCard(defenseCard) || !usability.playable) {
            setBattleFeedback(TEXT.feedback.invalidCard, CONFIG.battleFeedback.durationMs);
            return;
          }
          applyDefenseCard('player', defenseCard);
          return;
        }

        const monsterHit = getHitRect(gameState.uiRects.monsters, x, y);
        if (monsterHit && gameState.turnSide === 'player' && gameState.turnPhase === 'attack') {
          if (monsterHit.side === 'player') {
            trySelectActor(monsterHit.id);
            return;
          }
          if (monsterHit.side === 'enemy') {
            trySelectTargetAndResolve(monsterHit.id);
            return;
          }
        }

        const cardHit = getHitRect(gameState.uiRects.playerCards, x, y);
        if (cardHit && gameState.turnSide === 'player') {
          if (gameState.turnPhase === 'attack') {
            beginPlayerCardSelection(cardHit.id);
            return;
          }
          if (gameState.turnPhase === 'guts') {
            togglePlayerGutsCard(cardHit.id);
          }
        }
      }

      function update() {
        if (gameState.phase !== 'playing') return;
        const now = performance.now();

        while (gameState.inputQueue.length > 0) {
          const event = gameState.inputQueue.shift();
          if (event.type === 'click') {
            handleCanvasClick(event.x, event.y);
          }
        }

        if (gameState.ui.defenseResolveDelay.active) {
          if (now >= gameState.ui.defenseResolveDelay.until) {
            gameState.ui.defenseResolveDelay.active = false;
            gameState.ui.defenseResolveDelay.until = 0;
            resolvePendingAttack();
            checkWinCondition();
          }
        }

        if (
          !gameState.ui.defenseReaction.active &&
          gameState.turnSide === 'enemy' &&
          gameState.turnPhase === 'attack' &&
          now >= gameState.enemyActionTimer
        ) {
          gameState.enemyActionTimer = now + 700;
          runEnemyAttackStep();
        }

        if (gameState.ui.defenseReaction.active) {
          const reaction = gameState.ui.defenseReaction;
          if (reaction.defenderSide === 'player') {
            reaction.remainingMs = Math.max(0, Math.floor(reaction.expiresAt - now));
          } else {
            reaction.remainingMs = 0;
          }
          if (reaction.defenderSide === 'player' && now >= reaction.expiresAt) {
            resolvePendingAttack();
            checkWinCondition();
          }
        }

        updateEffectPreview(now);
        updateCardPreviewState();
        if (gameState.ui.turnFlash.timer <= now) {
          gameState.ui.turnFlash.text = '';
        }
        if (gameState.ui.battleFeedback.timer <= now) {
          gameState.ui.battleFeedback.text = '';
        }
        checkWinCondition();
      }

      function updateCardPreviewState() {
        const selectedCard = getCardFromHand(gameState.player, gameState.selectedCardId);
        const hoveredCard = getCardFromHand(gameState.player, gameState.hoveredCardId);
        const previewCard = selectedCard || hoveredCard;
        const previewActorId = gameState.selectedActorId || null;
        gameState.ui.cardPreview = buildCardPreviewState(gameState, 'player', previewCard, previewActorId);
        const handPreviewById = {};
        gameState.player.hand.forEach((card) => {
          handPreviewById[card.id] = buildCardPreviewState(gameState, 'player', card, previewActorId);
        });
        gameState.ui.handCardPreviewById = handPreviewById;
        updateHighlightState(previewCard);
      }

      function updateHighlightState(previewCard) {
        const highlight = gameState.ui.highlight || {};
        const safeCard = previewCard || null;
        const selectedActor = getMonster(gameState.player, gameState.selectedActorId);
        const baseUsability = getCardUsability('player', safeCard, selectedActor || null);
        const canShowActors = !!safeCard && baseUsability.playable;
        const canShowTargets = gameState.selectionStep === 'selectTarget' && !!safeCard && baseUsability.playable;

        highlight.selectedCardId = gameState.selectedCardId || null;
        highlight.selectedActorId = gameState.selectedActorId || null;
        highlight.hoveredMonsterId = highlight.hoveredMonsterId || null;
        highlight.validActorIds = canShowActors
          ? getValidActorIds('player').filter((id) => getActorSelectionValidation('player', id, safeCard).valid)
          : [];
        highlight.validTargetIds = canShowTargets
          ? getValidTargetIds('player', safeCard)
          : [];

        gameState.ui.highlight = highlight;
      }

      function drawPanel(x, y, width, height) {
        ctx.fillStyle = CONFIG.colors.panel;
        ctx.fillRect(x, y, width, height);
        ctx.strokeStyle = CONFIG.colors.border;
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, width, height);
      }

      function drawButton(x, y, label, action, enabled) {
        ctx.fillStyle = enabled ? CONFIG.colors.button : CONFIG.colors.buttonOff;
        ctx.fillRect(x, y, CONFIG.button.width, CONFIG.button.height);
        ctx.strokeStyle = '#82a3db';
        ctx.lineWidth = 1;
        ctx.strokeRect(x, y, CONFIG.button.width, CONFIG.button.height);

        ctx.fillStyle = enabled ? '#fff' : '#9fb4dd';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = 'bold 14px Arial';
        ctx.fillText(label, x + CONFIG.button.width / 2, y + CONFIG.button.height / 2);
        
        gameState.uiRects.buttons.push({
          x,
          y,
          w: CONFIG.button.width,
          h: CONFIG.button.height,
          action,
          enabled
        });
      }

      function drawElementPill(element, x, y, value, max) {
        ctx.fillStyle = getElementColor(element);
        ctx.fillRect(x, y, 98, 20);
        ctx.fillStyle = '#111';
        ctx.font = 'bold 12px Arial';
        ctx.textAlign = 'left';
        ctx.fillText(`${capitalize(element)} ${value}/${max}`, x + 6, y + 14);
      }

      function getTurnBannerText() {
        let text = TEXT.turn.playerAttack;
        if (gameState.phase === 'gameover') {
          return gameState.winner === 'player'
            ? TEXT.turn.gameoverPlayer
            : TEXT.turn.gameoverEnemy;
        }
        if (gameState.turnSide === 'enemy') {
          return gameState.turnPhase === 'guts'
            ? TEXT.turn.enemyGuts
            : TEXT.turn.enemyAttack;
        }
        if (gameState.turnPhase === 'guts') {
          return TEXT.turn.playerGuts;
        }
        return text;
      }

      function drawMonsterCard(monster, side, x, y) {
        drawPanel(x, y, CONFIG.monsterCard.width, CONFIG.monsterCard.height);

        const highlight = gameState.ui.highlight || {};
        const validActorIds = Array.isArray(highlight.validActorIds) ? highlight.validActorIds : [];
        const validTargetIds = Array.isArray(highlight.validTargetIds) ? highlight.validTargetIds : [];
        const selectedActor = highlight.selectedActorId === monster.id;
        const selectedTarget = gameState.selectedTargetId === monster.id;
        const validActor = side === 'player' && validActorIds.includes(monster.id);
        const validTarget = side === 'enemy' && validTargetIds.includes(monster.id);
        const hoveredMonster = highlight.hoveredMonsterId === monster.id;
        const acted =
          monster.alive &&
          monster.hasActedThisTurn &&
          gameState.turnPhase === 'attack' &&
          gameState.turnSide === side;
        const disabled = !monster.alive;
        const actorSelectionActive = gameState.selectionStep === 'selectActor';
        const targetSelectionActive = gameState.selectionStep === 'selectTarget';
        const unusableActor = actorSelectionActive && side === 'player' && monster.alive && !validActor;
        const unusableTarget = targetSelectionActive && side === 'enemy' && monster.alive && !validTarget;
        const unusableState = unusableActor || unusableTarget || acted || disabled;
        const activeTurnMonster = gameState.turnSide === side && gameState.turnPhase === 'attack';
        const cardPadding = CONFIG.monsterCard.padding;
        const portraitX = x + cardPadding;
        const portraitY = y + cardPadding;
        const portraitW = CONFIG.monsterCard.width - cardPadding * 2;
        const inset = CONFIG.monsterCard.edgeInset;

        if (selectedActor) {
          ctx.strokeStyle = CONFIG.colors.actorStrong;
          ctx.lineWidth = 4;
          ctx.strokeRect(x + inset, y + inset, CONFIG.monsterCard.width - inset * 2, CONFIG.monsterCard.height - inset * 2);
        } else if (validTarget || selectedTarget) {
          ctx.strokeStyle = CONFIG.colors.targetStrong;
          ctx.lineWidth = 4;
          ctx.strokeRect(x + inset, y + inset, CONFIG.monsterCard.width - inset * 2, CONFIG.monsterCard.height - inset * 2);
        } else if (validActor) {
          ctx.fillStyle = CONFIG.colors.actorSoft;
          ctx.fillRect(x + inset, y + inset, CONFIG.monsterCard.width - inset * 2, CONFIG.monsterCard.height - inset * 2);
        } else if (activeTurnMonster && monster.alive && !unusableState) {
          ctx.strokeStyle = 'rgba(235, 243, 255, 0.55)';
          ctx.lineWidth = 2;
          ctx.strokeRect(x + inset, y + inset, CONFIG.monsterCard.width - inset * 2, CONFIG.monsterCard.height - inset * 2);
        }

        drawAssetOrFallback(
          monster.asset,
          portraitX,
          portraitY,
          portraitW,
          CONFIG.monsterCard.iconSize,
          monster.id
        );

        drawMonsterTypeBadges(monster, x, y);

        ctx.fillStyle = '#fff';
        ctx.textAlign = 'left';
        ctx.font = 'bold 16px Arial';
        ctx.fillText(monster.name, x + 12, y + CONFIG.monsterCard.nameY);

        drawMonsterHpBar(monster, x + 12, y + CONFIG.monsterCard.hpBarY, CONFIG.monsterCard.hpBarWidth, CONFIG.monsterCard.hpBarHeight);

        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 24px Arial';
        ctx.fillText(`HP ${monster.hp}`, x + 12, y + CONFIG.monsterCard.hpTextY);

        if (unusableState) {
          ctx.fillStyle = disabled ? CONFIG.colors.dead : 'rgba(10, 14, 24, 0.48)';
          ctx.fillRect(x, y, CONFIG.monsterCard.width, CONFIG.monsterCard.height);
          ctx.fillStyle = disabled ? '#c8d1e8' : '#ffd073';
          ctx.font = 'bold 14px Arial';
          const stateText = disabled
            ? TEXT.monster.down
            : (acted ? TEXT.monster.acted : TEXT.monster.disabled);
          ctx.fillText(stateText, x + 12, y + 24);
        }

        if (hoveredMonster && !selectedActor && !selectedTarget) {
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.78)';
          ctx.lineWidth = 2;
          ctx.strokeRect(x + 4, y + 4, CONFIG.monsterCard.width - 8, CONFIG.monsterCard.height - 8);
        }

        gameState.uiRects.monsters.push({
          id: monster.id,
          side,
          x,
          y,
          w: CONFIG.monsterCard.width,
          h: CONFIG.monsterCard.height
        });
      }

      function drawMonsterTypeBadges(monster, x, y) {
        const badgeSize = CONFIG.monsterCard.badgeSize;
        const gap = CONFIG.monsterCard.badgeGap;
        const baseX = x + CONFIG.monsterCard.width - badgeSize - 10;
        const attackY = y + 10;
        const defenseY = attackY + badgeSize + gap;
        drawTypeBadge(baseX, attackY, badgeSize, monster.attackType, TEXT.monster.typeAttack);
        drawTypeBadge(baseX, defenseY, badgeSize, monster.defenseType, TEXT.monster.typeDefense);
      }

      function drawTypeBadge(x, y, size, element, label) {
        ctx.save();
        ctx.fillStyle = getElementColor(element);
        ctx.fillRect(x, y, size, size);
        ctx.strokeStyle = 'rgba(18, 23, 37, 0.92)';
        ctx.lineWidth = 1;
        ctx.strokeRect(x, y, size, size);
        ctx.fillStyle = '#071220';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = 'bold 11px Arial';
        ctx.fillText(label, x + size / 2, y + size / 2);
        ctx.restore();
      }

      function drawMonsterHpBar(monster, x, y, w, h) {
        ctx.fillStyle = '#3e2531';
        ctx.fillRect(x, y, w, h);
        const ratioPercent = monster.maxHp > 0
          ? Math.max(0, Math.min(100, Math.floor((monster.hp * 100) / monster.maxHp)))
          : 0;
        ctx.fillStyle = CONFIG.colors.hp;
        ctx.fillRect(x, y, Math.floor((w * ratioPercent) / 100), h);
        ctx.strokeStyle = '#8ea8d9';
        ctx.lineWidth = 1;
        ctx.strokeRect(x, y, w, h);
      }

      function drawBattleArea() {
        drawPanel(CONFIG.monsterArea.x, CONFIG.monsterArea.y, CONFIG.monsterArea.width, CONFIG.monsterArea.height);

        gameState.enemy.monsters.forEach((monster, index) => {
          const x = CONFIG.monsterArea.x + 10 + index * (CONFIG.monsterCard.width + CONFIG.monsterCard.gap);
          drawMonsterCard(monster, 'enemy', x, CONFIG.monsterArea.y + 10);
        });

        gameState.player.monsters.forEach((monster, index) => {
          const x = CONFIG.monsterArea.x + 10 + index * (CONFIG.monsterCard.width + CONFIG.monsterCard.gap);
          drawMonsterCard(monster, 'player', x, CONFIG.monsterArea.y + 186);
        });

        if (gameState.ui.effectPreview.visible) {
          const side = gameState.ui.effectPreview.side;
          const halfWidth = CONFIG.monsterArea.width / 2;
          const tintX = side === 'player' ? CONFIG.monsterArea.x : CONFIG.monsterArea.x + halfWidth;
          ctx.fillStyle = 'rgba(149, 202, 255, 0.08)';
          ctx.fillRect(tintX, CONFIG.monsterArea.y, halfWidth, CONFIG.monsterArea.height);
        }
      }

      function drawEffectPreview() {
        const preview = gameState.ui.effectPreview;
        if (!preview.visible) return;

        const panelW = 330;
        const panelH = 400;
        const panelX = preview.side === 'player' ? 120 : CONFIG.w - panelW - 120;
        const panelY = Math.floor((CONFIG.h - panelH) / 2);

        const card = findCardById(preview.cardId);
        const cardName = preview.cardName || card?.name || 'Unknown Card';

        ctx.save();
        ctx.fillStyle = 'rgba(6, 12, 22, 0.35)';
        ctx.fillRect(0, 0, CONFIG.w, CONFIG.h);

        ctx.fillStyle = 'rgba(22, 38, 70, 0.95)';
        ctx.fillRect(panelX, panelY, panelW, panelH);
        ctx.strokeStyle = '#9ad7ff';
        ctx.lineWidth = 3;
        ctx.strokeRect(panelX, panelY, panelW, panelH);

        ctx.shadowColor = 'rgba(130, 214, 255, 0.45)';
        ctx.shadowBlur = 14;
        ctx.strokeStyle = 'rgba(130, 214, 255, 0.85)';
        ctx.lineWidth = 2;
        ctx.strokeRect(panelX + 6, panelY + 6, panelW - 12, panelH - 12);
        ctx.shadowBlur = 0;

        drawAssetOrFallback(
          card?.asset || preview.cardId,
          panelX + 20,
          panelY + 26,
          panelW - 40,
          220,
          cardName
        );

        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'left';
        ctx.font = 'bold 28px Arial';
        ctx.fillText(cardName, panelX + 20, panelY + 280);

        if (preview.actorName) {
          ctx.font = '16px Arial';
          ctx.fillStyle = '#cde1ff';

      function getCardCategoryStyle(card) {
        if (card?.effect?.kind === 'defense') return { icon: TEXT.cardFace.categoryDef, color: '#7fb6ff' };
        if (card?.category === 'sup' || card?.effect?.kind === 'shard') return { icon: TEXT.cardFace.categorySup, color: '#8edc9a' };
        if (card?.category === 'evade') return { icon: TEXT.cardFace.categoryEvd, color: '#8ecfff' };
        return { icon: TEXT.cardFace.categoryAtk, color: '#ffb17a' };
      }

      function drawCardRequirementIcons(card, x, y) {
        const icons = [];
        ELEMENTS.forEach((element) => {
          const need = card?.requirement?.[element] ?? 0;
          if (need > 0) icons.push(`${capitalize(element).slice(0, 1)}${need}`);
        });
        if (card?.requiredAttackType) {
          icons.push(card.requiredAttackType.slice(0, 1).toUpperCase());
        }
        if (icons.length === 0) return;
        ctx.save();
        ctx.textAlign = 'left';
        ctx.font = 'bold 10px Arial';
        ctx.fillStyle = '#d4e4ff';
        ctx.fillText(icons.join(' '), x, y);
        ctx.restore();
      }

      function drawPlayerCard(card, x, y, hover) {
        const preview = gameState.ui.handCardPreviewById?.[card.id] || null;
        const selectedForGuts = gameState.temp.gutsSelectedCardIds.includes(card.id);

        const scale = hover ? 1.04 : 1;
        const width = CONFIG.handCard.width * scale;
        const height = CONFIG.handCard.height * scale;
        const dx = x - (width - CONFIG.handCard.width) / 2;
        const dy = y - (height - CONFIG.handCard.height) / 2;

        drawPanel(dx, dy, width, height);
        const categoryStyle = getCardCategoryStyle(card);
        ctx.strokeStyle = categoryStyle.color;
        ctx.lineWidth = 2;
        ctx.strokeRect(dx + 1, dy + 1, width - 2, height - 2);

        if (hover) {
          ctx.strokeStyle = CONFIG.colors.playableGlow;
          ctx.lineWidth = 3;
          ctx.strokeRect(dx + 1, dy + 1, width - 2, height - 2);
        }

        if (gameState.selectedCardId === card.id) {
          ctx.strokeStyle = '#ffe06d';
          ctx.lineWidth = 4;
          ctx.strokeRect(dx + 2, dy + 2, width - 4, height - 4);
        }

        if (selectedForGuts) {
          ctx.strokeStyle = '#71ffb4';
          ctx.lineWidth = 4;
          ctx.strokeRect(dx + 6, dy + 6, width - 12, height - 12);
        }

        if (gameState.ui.defenseReaction.active && gameState.ui.defenseReaction.defenderSide === 'player') {
          const defenseReady = isDefenseCard(card) && (preview?.playable || false);
          if (defenseReady) {
            ctx.strokeStyle = '#9ff7c7';
            ctx.lineWidth = 3;
            ctx.strokeRect(dx + 3, dy + 3, width - 6, height - 6);
          } else {
            ctx.fillStyle = 'rgba(14, 20, 33, 0.35)';
            ctx.fillRect(dx, dy, width, height);
          }
        }

        const artX = dx + CONFIG.handCard.artX;
        const artY = dy + CONFIG.handCard.artY;
        const artW = width - (CONFIG.handCard.width - CONFIG.handCard.artW);
        const artH = CONFIG.handCard.artH;
        drawAssetOrFallback(card.asset, artX, artY, artW, artH, card.id);

        ctx.fillStyle = categoryStyle.color;
        ctx.textAlign = 'left';
        ctx.font = 'bold 12px Arial';
        ctx.fillText(categoryStyle.icon, dx + 8, dy + CONFIG.handCard.topY);
        drawCardRequirementIcons(card, dx + 26, dy + CONFIG.handCard.reqY);

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 12px Arial';
        ctx.fillText(card.name, dx + 8, dy + CONFIG.handCard.titleY);
        ctx.textAlign = 'right';
        ctx.font = 'bold 13px Arial';
        ctx.fillText(`${card.cost}`, dx + width - 8, dy + CONFIG.handCard.topY);

        const icon = card.effect?.kind === 'damage'
          ? TEXT.cardFace.damageIcon
          : (card.effect?.kind === 'defense' ? TEXT.cardFace.defenseIcon : TEXT.cardFace.shardIcon);
        const resultColor = preview?.playable
          ? (preview?.enhancedActive ? '#f0d76b' : '#ffffff')
          : '#ff9ea1';
        ctx.textAlign = 'left';
        ctx.fillStyle = resultColor;
        ctx.font = 'bold 18px Arial';
        ctx.fillText(`${icon}${preview?.mainValue || '-'}`, dx + 8, dy + CONFIG.handCard.resultY);

        ctx.textAlign = 'right';
        ctx.font = 'bold 11px Arial';
        ctx.fillStyle = '#b8cbf0';
        const specialIcons = Array.isArray(preview?.specialIcons) ? preview.specialIcons : [];
        if (specialIcons.length > 0) {
          ctx.fillText(specialIcons.join(' '), dx + width - 8, dy + CONFIG.handCard.iconY);
        }
        if (preview?.hasEnhance) {
          ctx.fillStyle = preview?.enhancedActive ? '#e9da7b' : '#8aa3c9';
          ctx.fillText(TEXT.cardFace.effectEnhance, dx + width - 8, dy + CONFIG.handCard.noteY);
        }

        if (!preview?.playable && gameState.turnPhase === 'attack') {
          ctx.fillStyle = CONFIG.colors.cardDisabled;
          ctx.fillRect(dx, dy, width, height);
        }

        gameState.uiRects.playerCards.push({
          id: card.id,
          x: dx,
          y: dy,
          w: width,
          h: height
        });
      }

      function getEnemyHeaderLayout() {
        const sections = CONFIG.enemyHeaderSections;
        const panel = CONFIG.enemyHeader;
        const gap = sections.gap;
        const innerX = panel.x + 10;
        const innerY = panel.y + 10;
        const innerH = panel.height - 20;
        const messageW = sections.message;
        const iconW = sections.icon;
        const infoW = sections.info;
        const miniW = panel.width - 20 - messageW - iconW - infoW - gap * 3;

        return {
          panel,
          message: { x: innerX, y: innerY, width: messageW, height: innerH },
          icon: { x: innerX + messageW + gap, y: innerY, width: iconW, height: innerH },
          miniHand: { x: innerX + messageW + gap + iconW + gap, y: innerY, width: miniW, height: innerH },
          info: { x: innerX + messageW + gap + iconW + gap + miniW + gap, y: innerY, width: infoW, height: innerH },
        };
      }

      function getSelectedCard() {
        return getCardFromHand(gameState.player, gameState.selectedCardId);
      }

      function wrapText(text, maxWidth) {
        const words = text.split(' ');
        const lines = [];
        let current = '';

        words.forEach((word) => {
          const candidate = current ? `${current} ${word}` : word;
          if (ctx.measureText(candidate).width > maxWidth && current) {
            lines.push(current);
            current = word;
          } else {
            current = candidate;
          }
        });

        if (current) lines.push(current);
        return lines;
      }

      function drawContextPanel() {
        drawPanel(CONFIG.contextPanel.x, CONFIG.contextPanel.y, CONFIG.contextPanel.width, CONFIG.contextPanel.height);

        ctx.fillStyle = '#fff';

        const preview = gameState.ui.cardPreview;

        if (gameState.ui.defenseReaction.active && gameState.ui.defenseReaction.defenderSide === 'player') {
          const remainingSec = ((gameState.ui.defenseReaction.remainingMs ?? 0) / 1000).toFixed(1);
          ctx.fillStyle = '#ffd88f';
          ctx.font = 'bold 16px Arial';
          ctx.fillText(
            formatText(TEXT.preview.defenseWindowStatus, { sec: remainingSec }),
            CONFIG.contextPanel.x + 12,
            y

          y += 22;
        }

        if (!preview.visible) {
          y = drawEmptyContextHint(y);
        } else {
          y = drawContextCardPreview(preview, y);

          y += 20;
        }

        ctx.fillStyle = '#d6e8ff';
        ctx.fillText(formatText(TEXT.preview.panelCost, { cost: card?.cost ?? 0 }), CONFIG.contextPanel.x + 12, y);
        y += 20;

        wrapText(
          formatText(TEXT.preview.panelRequirement, { text: preview.requirementText || TEXT.state.none }),

        ctx.fillText(`Deck ${gameState.player.deck.length} / ${playerDeckMax}   Discard ${gameState.player.discard.length}`, CONFIG.fieldPanel.x + 12, CONFIG.fieldPanel.y + 148);

      function drawTurnFlash(now) {
        const flash = gameState.ui.turnFlash;
        if (!flash.text || flash.timer <= now) return;
        const duration = flash.duration || CONFIG.turnFlash.durationMs;
        const remaining = clamp((flash.timer - now) / duration, 0, 1);
        const alpha = 0.25 + remaining * 0.55;
        const y = CONFIG.turnFlash.y;
        const h = CONFIG.turnFlash.height;

        ctx.fillStyle = `rgba(14, 30, 58, ${alpha})`;
        ctx.fillRect(0, y, CONFIG.w, h);
        ctx.strokeStyle = `rgba(130, 184, 255, ${alpha})`;
        ctx.lineWidth = 2;
        ctx.strokeRect(20, y + 2, CONFIG.w - 40, h - 4);
        ctx.fillStyle = '#e8f3ff';
        ctx.textAlign = 'center';
        ctx.font = 'bold 22px Arial';
        ctx.fillText(flash.text, CONFIG.w / 2, y + 28);
      }

      function drawBattleFeedback(now) {
        const feedback = gameState.ui.battleFeedback;
        if (!feedback.text || feedback.timer <= now) return;
        const duration = feedback.duration || CONFIG.battleFeedback.durationMs;
        const remaining = clamp((feedback.timer - now) / duration, 0, 1);
        const alpha = 0.2 + remaining * 0.65;
        const y = CONFIG.battleFeedback.y;
        const h = CONFIG.battleFeedback.height;

        ctx.fillStyle = `rgba(10, 18, 34, ${alpha})`;
        ctx.fillRect(24, y, CONFIG.w - 48, h);
        ctx.strokeStyle = `rgba(127, 171, 232, ${alpha})`;
        ctx.lineWidth = 1;
        ctx.strokeRect(24, y, CONFIG.w - 48, h);
        ctx.fillStyle = '#dfeeff';
        ctx.textAlign = 'center';
        ctx.font = 'bold 16px Arial';
        ctx.fillText(feedback.text, CONFIG.w / 2, y + 21);

function drawLogOverlay() {

      function render() {
        const now = performance.now();
        ctx.fillStyle = CONFIG.colors.bg;
        ctx.fillRect(0, 0, CONFIG.w, CONFIG.h);

        gameState.uiRects = { playerCards: [], monsters: [], buttons: [] };

        drawEnemyHeader();
        drawBattleArea();
        drawMiddleBand();
        drawPlayerHandArea();
        drawContextPanel();
        drawBattleInfoPanel();
        drawTurnFlash(now);
        drawBattleFeedback(now);
        drawEffectPreview();
        drawLogOverlay();
      }

      function getHitRect(rects, x, y) {
        return rects.find((rect) =>
          rect.enabled !== false &&
          x >= rect.x &&
          x <= rect.x + rect.w &&
          y >= rect.y &&
          y <= rect.y + rect.h
        ) || null;
      }

      function toCanvasPoint(event) {
        const rect = event.target.getBoundingClientRect();
        return {
          x: ((event.clientX - rect.left) / rect.width) * CONFIG.w,
          y: ((event.clientY - rect.top) / rect.height) * CONFIG.h,
        };
      }

      function onCanvasClick(event) {
        const point = toCanvasPoint(event);
        gameState.inputQueue.push({ type: 'click', x: point.x, y: point.y });
      }

      function onMouseMove(event) {
        const point = toCanvasPoint(event);
        const cardHit = getHitRect(gameState.uiRects.playerCards, point.x, point.y);
        const monsterHit = getHitRect(gameState.uiRects.monsters, point.x, point.y);
        gameState.hoveredCardId = cardHit ? cardHit.id : null;
        gameState.ui.highlight.hoveredMonsterId = monsterHit ? monsterHit.id : null;
      }

      function onWheel(event) {
        const point = toCanvasPoint(event);

        if (gameState.ui.showLogOverlay) {
          const inLog =
            point.x >= CONFIG.logOverlay.x &&
            point.x <= CONFIG.logOverlay.x + CONFIG.logOverlay.width &&
            point.y >= CONFIG.logOverlay.y &&
            point.y <= CONFIG.logOverlay.y + CONFIG.logOverlay.height;

          if (inLog) {
            gameState.logScroll = Math.max(0, gameState.logScroll + Math.sign(event.deltaY));
            event.preventDefault();
          }
          return;
        }

        const inContext =
          point.x >= CONFIG.contextPanel.x &&
          point.x <= CONFIG.contextPanel.x + CONFIG.contextPanel.width &&
          point.y >= CONFIG.contextPanel.y &&
          point.y <= CONFIG.contextPanel.y + CONFIG.contextPanel.height;

        if (inContext) {
          gameState.detailScroll = Math.max(0, gameState.detailScroll + Math.sign(event.deltaY));
          event.preventDefault();
        }
      }

      function initializeGame() {
        gameState.log = [];
        gameState.winner = null;
        gameState.ui.showLogOverlay = false;
        gameState.ui.enemyMessage = TEXT.state.enemyIdleMessage;
        hideEffectPreview();
        gameState.assets.refs = {};
        gameState.assets.warnedMissing = {};
        gameState.hoveredCardId = null;
        gameState.ui.highlight.hoveredMonsterId = null;
        gameState.ui.highlight.selectedCardId = null;
        gameState.ui.highlight.selectedActorId = null;
        gameState.ui.highlight.validActorIds = [];
        gameState.ui.highlight.validTargetIds = [];
        gameState.ui.handCardPreviewById = {};
        clearDefenseReactionState();
        gameState.ui.defenseResolveDelay = { active: false, until: 0 };
        gameState.logScroll = 0;
        gameState.detailScroll = 0;
        gameState.field = {
          fire: CONFIG.energy.start,
          thunder: CONFIG.energy.start,
          earth: CONFIG.energy.start
        };

        gameState.player = {
          guts: CONFIG.guts.start,
          maxGuts: CONFIG.guts.max,
          monsters: [
            makeMonster('p1', 'Ember Cub', 'fire', 'beast', 'monsters.beast_bear'),
            makeMonster('p2', 'Bolt Pup', 'thunder', 'beast', 'monsters.thunder_wolf'),
            makeMonster('p3', 'Root Pal', 'earth', 'beast', 'monsters.earth_turtle'),
          ],
          hand: [],
          deck: createDeck('p'),
          discard: [],
        };

        gameState.enemy = {
          guts: CONFIG.guts.start,
          maxGuts: CONFIG.guts.max,
          monsters: [
            makeMonster('e1', 'Raider Ember', 'fire', 'beast', 'monsters.enemy_beast_bear'),
            makeMonster('e2', 'Raider Bolt', 'thunder', 'beast', 'monsters.enemy_thunder_wolf'),
            makeMonster('e3', 'Raider Root', 'earth', 'beast', 'monsters.enemy_earth_turtle'),
          ],
          hand: [],
          deck: createDeck('e'),
          discard: [],
        };

        gameState.phase = 'playing';
        clearSelection();
        startTurn('player');
        appendLog(TEXT.msg.battleStart);
      }

      function loop() {
        update();
        render();
        requestAnimationFrame(loop);
      }

      function boot() {
        canvas.addEventListener('click', onCanvasClick);
        canvas.addEventListener('mousemove', onMouseMove);
        canvas.addEventListener('wheel', onWheel, { passive: false });
        initializeGame();
        loop();
      }

      boot();
    })();
  </script>
</body>
</html>
