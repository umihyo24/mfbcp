<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>カードバトル MVP</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(160deg, #0c1630, #15284f);
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", system-ui, sans-serif;
      color: #eef4ff;
    }
    canvas {
      width: min(96vw, 1240px);
      height: auto;
      aspect-ratio: 1240 / 780;
      border: 2px solid #4567a5;
      background: #13264b;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.45);
    }
  </style>
</head>
<body>
  <canvas id="game" width="1240" height="780"></canvas>
  <script>
    // Assets expected under /assets (single flat folder, no subfolders required).
    const TEXT = {
      title: "モンスターカードバトル MVP",
      startButton: "開始",
      restartButton: "もう一度",
      phaseStart: "開始",
      phasePlaying: "バトル中",
      phaseGameover: "終了",
      turnPlayer: "あなたのターン",
      turnEnemy: "敵のターン",
      panelEnemy: "敵モンスター",
      panelPlayer: "味方モンスター",
      panelHand: "手札 (5枚)",
      panelDetail: "カード詳細",
      panelResource: "リソース",
      panelLog: "ログ",
      selectHintCard: "手札を選択してください",
      selectHintTarget: "攻撃先を選択してください",
      common: "通常",
      type: "属性",
      shard: "欠片",
      guts: "ガッツ",
      energy: "属性エネルギー",
      hp: "HP",
      winnerPlayer: "勝利！敵を全滅させました",
      winnerEnemy: "敗北…味方が全滅しました",
      logBattleStart: "バトル開始",
      logPlayerTurn: "あなたのターン開始",
      logEnemyTurn: "敵のターン開始",
      logNeedResource: "このカードは使用条件を満たしていません",
      logNeedTarget: "攻撃対象を選んでください",
      logDefeated: "{name} は倒れた",
      logAttack: "{actor} が {target} に {damage} ダメージ",
      logShard: "{owner} が {element} 欠片を使い ガッツ+1 / {element}エネルギー+1",
      ownerPlayer: "あなた",
      ownerEnemy: "敵",
      elementFire: "炎",
      elementThunder: "雷",
      elementEarth: "土",
      missingImage: "画像なし"
    };

    const CONFIG = {
      w: 1240,
      h: 780,
      teamSize: 3,
      handSize: 5,
      maxLog: 12,
      enemyDelayMs: 650,
      damage: { COMMON: 22, TYPE: 30 },
      color: {
        bg: "#13264b",
        panel: "#203a6d",
        border: "#5278bb",
        text: "#eff4ff",
        muted: "#a8bbdf",
        hp: "#65df80",
        hpBg: "#294156",
        fire: "#e96552",
        thunder: "#f2c94c",
        earth: "#78cf7f",
        dead: "rgba(15,20,30,0.62)",
        selected: "#7fd8ff",
        target: "#ff9c9c",
        playable: "#84f7b1",
        card: "#1c335f",
        cardOff: "#1b2d4f"
      },
      rect: {
        turn: { x: 20, y: 16, w: 760, h: 48 },
        enemyRow: { x: 20, y: 74, w: 760, h: 182 },
        playerRow: { x: 20, y: 266, w: 760, h: 182 },
        hand: { x: 20, y: 458, w: 760, h: 210 },
        detail: { x: 790, y: 74, w: 430, h: 260 },
        resource: { x: 790, y: 344, w: 430, h: 150 },
        log: { x: 790, y: 504, w: 430, h: 244 },
        startOverlay: { x: 250, y: 200, w: 740, h: 380 }
      }
    };

    const ASSETS = {
      cards: {
        player_fire: "/assets/player_fire.png",
        player_thunder: "/assets/player_thunder.png",
        player_earth: "/assets/player_earth.png",
        enemy_fire: "/assets/enemy_fire.png",
        enemy_thunder: "/assets/enemy_thunder.png",
        enemy_earth: "/assets/enemy_earth.png",
        card_fire_attack: "/assets/card_fire_attack.png",
        card_thunder_attack: "/assets/card_thunder_attack.png",
        card_earth_attack: "/assets/card_earth_attack.png",
        card_fire_shard: "/assets/card_fire_shard.png",
        card_thunder_shard: "/assets/card_thunder_shard.png",
        card_earth_shard: "/assets/card_earth_shard.png"
      }
    };

    const ELEMENTS = ["fire", "thunder", "earth"];
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const gameState = {
      phase: "start", // "start" | "playing" | "gameover"
      turn: "player",
      winner: null,
      awaitingTarget: false,
      selectedCardId: null,
      ui: {
        hoverCardId: null,
        enemyMonsterRects: [],
        playerMonsterRects: [],
        handCardRects: [],
        startButtonRect: null
      },
      enemyActionAt: 0,
      logs: [],
      images: {},
      player: createSide("player"),
      enemy: createSide("enemy")
    };

    function createSide(side) {
      const isPlayer = side === "player";
      const monsters = [
        createMonster(`${side}-m1`, isPlayer ? "紅蓮" : "紅獣", "fire", isPlayer ? "player_fire" : "enemy_fire"),
        createMonster(`${side}-m2`, isPlayer ? "迅雷" : "雷獣", "thunder", isPlayer ? "player_thunder" : "enemy_thunder"),
        createMonster(`${side}-m3`, isPlayer ? "岩盾" : "土獣", "earth", isPlayer ? "player_earth" : "enemy_earth")
      ];
      return {
        side,
        monsters,
        guts: 3,
        energy: { fire: 1, thunder: 1, earth: 1 },
        deck: shuffle(makeDeck(side)),
        hand: [],
        discard: []
      };
    }

    function createMonster(id, name, element, imageKey) {
      return { id, name, element, hp: 100, maxHp: 100, alive: true, imageKey };
    }

    function createCard(id, name, type, element, costGuts, costEnergy, damage, imageKey) {
      return { id, name, type, element, costGuts, costEnergy, damage, imageKey };
    }

    function makeDeck(owner) {
      return [
        createCard(`${owner}-c1`, "炎撃", "COMMON", "fire", 2, { fire: 1 }, CONFIG.damage.COMMON, "card_fire_attack"),
        createCard(`${owner}-c2`, "雷撃", "COMMON", "thunder", 2, { thunder: 1 }, CONFIG.damage.COMMON, "card_thunder_attack"),
        createCard(`${owner}-c3`, "土撃", "COMMON", "earth", 2, { earth: 1 }, CONFIG.damage.COMMON, "card_earth_attack"),
        createCard(`${owner}-c4`, "焔砲", "TYPE", "fire", 3, { fire: 2 }, CONFIG.damage.TYPE, "card_fire_attack"),
        createCard(`${owner}-c5`, "雷砲", "TYPE", "thunder", 3, { thunder: 2 }, CONFIG.damage.TYPE, "card_thunder_attack"),
        createCard(`${owner}-c6`, "地砲", "TYPE", "earth", 3, { earth: 2 }, CONFIG.damage.TYPE, "card_earth_attack"),
        createCard(`${owner}-c7`, "炎の欠片", "SHARD", "fire", 0, {}, 0, "card_fire_shard"),
        createCard(`${owner}-c8`, "雷の欠片", "SHARD", "thunder", 0, {}, 0, "card_thunder_shard"),
        createCard(`${owner}-c9`, "土の欠片", "SHARD", "earth", 0, {}, 0, "card_earth_shard"),
        createCard(`${owner}-c10`, "烈炎", "TYPE", "fire", 3, { fire: 2 }, CONFIG.damage.TYPE, "card_fire_attack"),
        createCard(`${owner}-c11`, "落雷", "TYPE", "thunder", 3, { thunder: 2 }, CONFIG.damage.TYPE, "card_thunder_attack"),
        createCard(`${owner}-c12`, "隆起", "TYPE", "earth", 3, { earth: 2 }, CONFIG.damage.TYPE, "card_earth_attack")
      ];
    }

    function initGame() {
      gameState.phase = "playing";
      gameState.turn = "player";
      gameState.winner = null;
      gameState.awaitingTarget = false;
      gameState.selectedCardId = null;
      gameState.logs = [];
      gameState.player = createSide("player");
      gameState.enemy = createSide("enemy");
      fillHand(gameState.player);
      fillHand(gameState.enemy);
      log(TEXT.logBattleStart);
      log(TEXT.logPlayerTurn);
    }

    function fillHand(sideData) {
      while (sideData.hand.length < CONFIG.handSize) {
        if (sideData.deck.length === 0) {
          sideData.deck = shuffle(sideData.discard.splice(0));
        }
        if (sideData.deck.length === 0) return;
        sideData.hand.push(sideData.deck.pop());
      }
    }

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function log(message) {
      gameState.logs.push(message);
      if (gameState.logs.length > CONFIG.maxLog) gameState.logs.shift();
    }

    function elementColor(element) {
      return CONFIG.color[element] || CONFIG.color.border;
    }

    function elementLabel(element) {
      if (element === "fire") return TEXT.elementFire;
      if (element === "thunder") return TEXT.elementThunder;
      return TEXT.elementEarth;
    }

    function cardTypeLabel(type) {
      if (type === "COMMON") return TEXT.common;
      if (type === "TYPE") return TEXT.type;
      return TEXT.shard;
    }

    function currentSide() {
      return gameState.turn === "player" ? gameState.player : gameState.enemy;
    }

    function opposingSide() {
      return gameState.turn === "player" ? gameState.enemy : gameState.player;
    }

    function living(monsters) {
      return monsters.filter((m) => m.alive);
    }

    function getCardById(sideData, cardId) {
      return sideData.hand.find((c) => c.id === cardId) || null;
    }

    function canPlayCard(sideData, card) {
      if (!card) return false;
      if (card.type === "SHARD") return true;
      if (sideData.guts < card.costGuts) return false;
      return Object.entries(card.costEnergy).every(([k, v]) => (sideData.energy[k] || 0) >= v);
    }

    function spendCosts(sideData, card) {
      if (card.type === "SHARD") return;
      sideData.guts -= card.costGuts;
      Object.entries(card.costEnergy).forEach(([k, v]) => {
        sideData.energy[k] -= v;
      });
    }

    function useCardWithoutTarget(sideData, opponentData, card) {
      if (card.type !== "SHARD") return false;
      sideData.guts += 1;
      sideData.energy[card.element] += 1;
      discardUsedCard(sideData, card.id);
      log(TEXT.logShard
        .replace("{owner}", sideData.side === "player" ? TEXT.ownerPlayer : TEXT.ownerEnemy)
        .replaceAll("{element}", elementLabel(card.element)));
      return true;
    }

    function useCardOnTarget(sideData, opponentData, card, targetId) {
      const target = opponentData.monsters.find((m) => m.id === targetId && m.alive);
      if (!target) return false;
      spendCosts(sideData, card);
      target.hp -= card.damage;
      if (target.hp <= 0) {
        target.hp = 0;
        target.alive = false;
        log(TEXT.logDefeated.replace("{name}", target.name));
      }
      const actor = living(sideData.monsters)[0] || sideData.monsters[0];
      log(TEXT.logAttack.replace("{actor}", actor.name).replace("{target}", target.name).replace("{damage}", card.damage));
      discardUsedCard(sideData, card.id);
      return true;
    }

    function discardUsedCard(sideData, cardId) {
      const idx = sideData.hand.findIndex((c) => c.id === cardId);
      if (idx >= 0) {
        const [used] = sideData.hand.splice(idx, 1);
        sideData.discard.push(used);
      }
      fillHand(sideData);
    }

    function endTurn() {
      gameState.awaitingTarget = false;
      gameState.selectedCardId = null;
      gameState.turn = gameState.turn === "player" ? "enemy" : "player";
      log(gameState.turn === "player" ? TEXT.logPlayerTurn : TEXT.logEnemyTurn);
      if (gameState.turn === "enemy") {
        gameState.enemyActionAt = performance.now() + CONFIG.enemyDelayMs;
      }
    }

    function enemyAct() {
      const sideData = gameState.enemy;
      const targetData = gameState.player;
      const playable = sideData.hand.filter((c) => canPlayCard(sideData, c));
      if (playable.length === 0) { endTurn(); return; }
      const card = playable[Math.floor(Math.random() * playable.length)];
      if (card.type === "SHARD") {
        useCardWithoutTarget(sideData, targetData, card);
      } else {
        const targets = living(targetData.monsters);
        if (targets.length === 0) return;
        const target = targets[Math.floor(Math.random() * targets.length)];
        useCardOnTarget(sideData, targetData, card, target.id);
      }
      checkGameOver();
      if (gameState.phase === "playing") endTurn();
    }

    function checkGameOver() {
      const playerAlive = living(gameState.player.monsters).length;
      const enemyAlive = living(gameState.enemy.monsters).length;
      if (enemyAlive === 0) {
        gameState.phase = "gameover";
        gameState.winner = "player";
      } else if (playerAlive === 0) {
        gameState.phase = "gameover";
        gameState.winner = "enemy";
      }
    }

    function update(now) {
      if (gameState.phase !== "playing") return;
      if (gameState.turn === "enemy" && now >= gameState.enemyActionAt) {
        enemyAct();
      }
    }

    function drawPanel(rect, title) {
      ctx.fillStyle = CONFIG.color.panel;
      ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
      ctx.strokeStyle = CONFIG.color.border;
      ctx.lineWidth = 2;
      ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
      ctx.fillStyle = CONFIG.color.text;
      ctx.font = "bold 18px sans-serif";
      ctx.fillText(title, rect.x + 12, rect.y + 26);
    }

    function drawImageWithFallback(key, x, y, w, h, borderColor) {
      const imageState = gameState.images[key];
      if (imageState && imageState.status === "loaded") {
        ctx.drawImage(imageState.image, x, y, w, h);
      } else {
        ctx.fillStyle = "#253d70";
        ctx.fillRect(x, y, w, h);
        ctx.strokeStyle = borderColor;
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, w, h);
        ctx.fillStyle = "#cfdcff";
        ctx.font = "12px sans-serif";
        const lines = [TEXT.missingImage, key];
        lines.forEach((line, i) => {
          ctx.fillText(line, x + 8, y + 20 + i * 16);
        });
      }
    }

    function drawMonsterRow(sideData, rect, isEnemy) {
      drawPanel(rect, isEnemy ? TEXT.panelEnemy : TEXT.panelPlayer);
      const slots = [];
      const gap = 12;
      const cardW = (rect.w - 24 - gap * 2) / 3;
      const cardH = 136;
      sideData.monsters.forEach((m, i) => {
        const x = rect.x + 12 + i * (cardW + gap);
        const y = rect.y + 34;
        const border = elementColor(m.element);
        drawImageWithFallback(m.imageKey, x, y, cardW, 82, border);
        ctx.strokeStyle = border;
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, cardW, cardH);
        if (!m.alive) {
          ctx.fillStyle = CONFIG.color.dead;
          ctx.fillRect(x, y, cardW, cardH);
        }
        ctx.fillStyle = CONFIG.color.text;
        ctx.font = "bold 15px sans-serif";
        ctx.fillText(`${m.name} (${elementLabel(m.element)})`, x + 8, y + 98);
        ctx.fillStyle = CONFIG.color.muted;
        ctx.font = "13px sans-serif";
        ctx.fillText(`${TEXT.hp}: ${m.hp}/${m.maxHp}`, x + 8, y + 116);
        ctx.fillStyle = CONFIG.color.hpBg;
        ctx.fillRect(x + 8, y + 122, cardW - 16, 8);
        ctx.fillStyle = CONFIG.color.hp;
        ctx.fillRect(x + 8, y + 122, (cardW - 16) * (m.hp / m.maxHp), 8);
        slots.push({ id: m.id, x, y, w: cardW, h: cardH, alive: m.alive });
      });
      if (isEnemy) gameState.ui.enemyMonsterRects = slots;
      else gameState.ui.playerMonsterRects = slots;
    }

    function drawHand(rect) {
      drawPanel(rect, TEXT.panelHand);
      const hand = gameState.player.hand;
      const gap = 10;
      const cw = (rect.w - 24 - gap * 4) / 5;
      const ch = 164;
      const rects = [];
      hand.forEach((card, i) => {
        const x = rect.x + 12 + i * (cw + gap);
        const y = rect.y + 34;
        const playable = canPlayCard(gameState.player, card);
        ctx.fillStyle = playable ? CONFIG.color.card : CONFIG.color.cardOff;
        ctx.fillRect(x, y, cw, ch);
        drawImageWithFallback(card.imageKey, x + 6, y + 6, cw - 12, 78, elementColor(card.element));
        ctx.strokeStyle = gameState.selectedCardId === card.id ? CONFIG.color.selected : elementColor(card.element);
        ctx.lineWidth = 3;
        ctx.strokeRect(x, y, cw, ch);
        if (playable) {
          ctx.strokeStyle = CONFIG.color.playable;
          ctx.lineWidth = 1;
          ctx.strokeRect(x + 3, y + 3, cw - 6, ch - 6);
        }
        ctx.fillStyle = CONFIG.color.text;
        ctx.font = "bold 14px sans-serif";
        ctx.fillText(card.name, x + 8, y + 100);
        ctx.font = "12px sans-serif";
        ctx.fillStyle = CONFIG.color.muted;
        ctx.fillText(`${cardTypeLabel(card.type)} / ${elementLabel(card.element)}`, x + 8, y + 118);
        ctx.fillText(`${TEXT.guts}: ${card.costGuts}`, x + 8, y + 136);
        rects.push({ id: card.id, x, y, w: cw, h: ch });
      });
      gameState.ui.handCardRects = rects;

      ctx.fillStyle = CONFIG.color.muted;
      ctx.font = "14px sans-serif";
      const hint = gameState.awaitingTarget ? TEXT.selectHintTarget : TEXT.selectHintCard;
      ctx.fillText(hint, rect.x + 14, rect.y + rect.h - 14);
    }

    function drawDetailPanel(rect) {
      drawPanel(rect, TEXT.panelDetail);
      const card = getCardById(gameState.player, gameState.selectedCardId);
      if (!card) {
        ctx.fillStyle = CONFIG.color.muted;
        ctx.font = "15px sans-serif";
        ctx.fillText(TEXT.selectHintCard, rect.x + 12, rect.y + 58);
        return;
      }
      drawImageWithFallback(card.imageKey, rect.x + 14, rect.y + 42, 180, 96, elementColor(card.element));
      ctx.fillStyle = CONFIG.color.text;
      ctx.font = "bold 18px sans-serif";
      ctx.fillText(card.name, rect.x + 206, rect.y + 64);
      ctx.font = "14px sans-serif";
      ctx.fillStyle = CONFIG.color.muted;
      ctx.fillText(`種別: ${cardTypeLabel(card.type)}`, rect.x + 206, rect.y + 88);
      ctx.fillText(`属性: ${elementLabel(card.element)}`, rect.x + 206, rect.y + 110);
      ctx.fillText(`必要ガッツ: ${card.costGuts}`, rect.x + 206, rect.y + 132);
      if (card.type === "SHARD") {
        ctx.fillText("効果: ガッツ+1 / 同属性エネルギー+1", rect.x + 14, rect.y + 164);
      } else {
        const need = Object.entries(card.costEnergy).map(([k, v]) => `${elementLabel(k)}${v}`).join(" ");
        ctx.fillText(`必要エネルギー: ${need}`, rect.x + 14, rect.y + 164);
        ctx.fillText(`ダメージ: ${card.damage}`, rect.x + 14, rect.y + 186);
      }
    }

    function drawResourcePanel(rect) {
      drawPanel(rect, TEXT.panelResource);
      drawSideResource(gameState.player, rect.x + 14, rect.y + 48, TEXT.ownerPlayer);
      drawSideResource(gameState.enemy, rect.x + 14, rect.y + 96, TEXT.ownerEnemy);
    }

    function drawSideResource(sideData, x, y, label) {
      ctx.fillStyle = CONFIG.color.text;
      ctx.font = "bold 14px sans-serif";
      ctx.fillText(`${label}: ${TEXT.guts} ${sideData.guts}`, x, y);
      let cx = x + 170;
      ELEMENTS.forEach((el) => {
        ctx.fillStyle = elementColor(el);
        ctx.fillRect(cx, y - 12, 14, 14);
        ctx.fillStyle = CONFIG.color.text;
        ctx.fillText(`${elementLabel(el)} ${sideData.energy[el]}`, cx + 20, y);
        cx += 90;
      });
    }

    function drawLogPanel(rect) {
      drawPanel(rect, TEXT.panelLog);
      ctx.font = "14px sans-serif";
      const lines = gameState.logs.slice(-10);
      lines.forEach((line, i) => {
        ctx.fillStyle = i % 2 === 0 ? CONFIG.color.text : CONFIG.color.muted;
        ctx.fillText(`・${line}`, rect.x + 12, rect.y + 52 + i * 20);
      });
    }

    function drawTurnBanner() {
      const r = CONFIG.rect.turn;
      drawPanel(r, TEXT.title);
      ctx.fillStyle = CONFIG.color.text;
      ctx.font = "bold 18px sans-serif";
      const phaseLabel = gameState.phase === "start" ? TEXT.phaseStart : gameState.phase === "playing" ? TEXT.phasePlaying : TEXT.phaseGameover;
      const turnLabel = gameState.turn === "player" ? TEXT.turnPlayer : TEXT.turnEnemy;
      ctx.fillText(`${phaseLabel} / ${turnLabel}`, r.x + 14, r.y + 40);
    }

    function drawStartOrGameoverOverlay() {
      const r = CONFIG.rect.startOverlay;
      ctx.fillStyle = "rgba(8,14,30,0.78)";
      ctx.fillRect(r.x, r.y, r.w, r.h);
      ctx.strokeStyle = CONFIG.color.border;
      ctx.lineWidth = 2;
      ctx.strokeRect(r.x, r.y, r.w, r.h);

      ctx.fillStyle = CONFIG.color.text;
      ctx.font = "bold 36px sans-serif";
      ctx.fillText(TEXT.title, r.x + 120, r.y + 96);

      ctx.font = "18px sans-serif";
      if (gameState.phase === "gameover") {
        ctx.fillText(gameState.winner === "player" ? TEXT.winnerPlayer : TEXT.winnerEnemy, r.x + 120, r.y + 150);
      }

      const label = gameState.phase === "start" ? TEXT.startButton : TEXT.restartButton;
      const btn = { x: r.x + 280, y: r.y + 230, w: 180, h: 62 };
      gameState.ui.startButtonRect = btn;
      ctx.fillStyle = "#2d4f8f";
      ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
      ctx.strokeStyle = "#8db1f3";
      ctx.strokeRect(btn.x, btn.y, btn.w, btn.h);
      ctx.font = "bold 24px sans-serif";
      ctx.fillStyle = CONFIG.color.text;
      ctx.fillText(label, btn.x + 56, btn.y + 39);
    }

    function render() {
      ctx.clearRect(0, 0, CONFIG.w, CONFIG.h);
      ctx.fillStyle = CONFIG.color.bg;
      ctx.fillRect(0, 0, CONFIG.w, CONFIG.h);

      drawTurnBanner();
      drawMonsterRow(gameState.enemy, CONFIG.rect.enemyRow, true);
      drawMonsterRow(gameState.player, CONFIG.rect.playerRow, false);
      drawHand(CONFIG.rect.hand);
      drawDetailPanel(CONFIG.rect.detail);
      drawResourcePanel(CONFIG.rect.resource);
      drawLogPanel(CONFIG.rect.log);

      if (gameState.phase === "start" || gameState.phase === "gameover") {
        drawStartOrGameoverOverlay();
      }
    }

    function isInside(pos, rect) {
      return pos.x >= rect.x && pos.x <= rect.x + rect.w && pos.y >= rect.y && pos.y <= rect.y + rect.h;
    }

    function getCanvasPos(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (e.clientX - rect.left) * (canvas.width / rect.width),
        y: (e.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    function handlePlayerCardClick(cardId) {
      if (gameState.turn !== "player" || gameState.phase !== "playing") return;
      const card = getCardById(gameState.player, cardId);
      if (!card) return;
      if (!canPlayCard(gameState.player, card)) {
        log(TEXT.logNeedResource);
        return;
      }
      gameState.selectedCardId = cardId;
      if (card.type === "SHARD") {
        useCardWithoutTarget(gameState.player, gameState.enemy, card);
        gameState.selectedCardId = null;
        checkGameOver();
        if (gameState.phase === "playing") endTurn();
      } else {
        gameState.awaitingTarget = true;
      }
    }

    function handleEnemyTargetClick(monsterId) {
      if (gameState.turn !== "player" || gameState.phase !== "playing") return;
      if (!gameState.awaitingTarget || !gameState.selectedCardId) {
        log(TEXT.logNeedTarget);
        return;
      }
      const card = getCardById(gameState.player, gameState.selectedCardId);
      if (!card) return;
      const ok = useCardOnTarget(gameState.player, gameState.enemy, card, monsterId);
      if (!ok) {
        log(TEXT.logNeedTarget);
        return;
      }
      gameState.awaitingTarget = false;
      gameState.selectedCardId = null;
      checkGameOver();
      if (gameState.phase === "playing") endTurn();
    }

    function handleClick(e) {
      const pos = getCanvasPos(e);
      if (gameState.phase === "start" || gameState.phase === "gameover") {
        if (gameState.ui.startButtonRect && isInside(pos, gameState.ui.startButtonRect)) {
          initGame();
        }
        return;
      }

      for (const r of gameState.ui.handCardRects) {
        if (isInside(pos, r)) {
          handlePlayerCardClick(r.id);
          return;
        }
      }

      for (const r of gameState.ui.enemyMonsterRects) {
        if (isInside(pos, r) && r.alive) {
          handleEnemyTargetClick(r.id);
          return;
        }
      }
    }

    function preloadImages() {
      Object.entries(ASSETS.cards).forEach(([key, src]) => {
        const image = new Image();
        gameState.images[key] = { image, status: "loading" };
        image.onload = () => { gameState.images[key].status = "loaded"; };
        image.onerror = () => { gameState.images[key].status = "error"; };
        image.src = src;
      });
    }

    function loop(now) {
      update(now);
      render();
      requestAnimationFrame(loop);
    }

    canvas.addEventListener("click", handleClick);
    preloadImages();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
